<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beyond Mechanics">
<meta name="theme-color" content="#0C4A6E">
<title>Beyond Mechanics — Patient Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bd:#0C4A6E;--b:#075985;--bl:#E0F2FE;--bm:#38BDF8;
  --tl:#0F6E56;--tlL:#E1F5EE;--tlM:#5DCAA5;
  --a:#BA7517;--al:#FAEEDA;--am:#EF9F27;
  --r:#A32D2D;--rl:#FCEBEB;--rm:#E24B4A;
  --pu:#534AB7;--puL:#EEEDFE;--puM:#AFA9EC;
  --bg:#f4f6f6;--card:#ffffff;--brd:#dde2e2;--text:#1a2020;--muted:#5a6868;--sub:#9aacac;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111818;--card:#1c2424;--brd:#2a3636;--text:#e8f0f0;--muted:#7aacac;--sub:#4a6868
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:740px;margin:0 auto;padding:10px 10px 50px}
.clinic-hdr{background:var(--bd);border-radius:16px;padding:15px 18px 13px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.clinic-hdr::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.ch-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ch-logo{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.ch-name{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.01em}
.ch-tag{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px}
.ch-badge{margin-left:auto;padding:3px 10px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);border-radius:20px;font-size:10px;font-weight:600;color:rgba(255,255,255,.75)}
.ch-sub{font-size:10px;color:rgba(255,255,255,.6);line-height:1.6;margin-top:1px}
.pt-card{background:var(--card);border:1.5px solid var(--brd);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.pt-top{display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap}
.pt-av{width:38px;height:38px;border-radius:10px;background:var(--puL);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--pu);flex-shrink:0}
.pt-nm{font-size:14px;font-weight:700}
.pt-mt{font-size:10px;color:var(--muted);margin-top:2px}
.pt-acts{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
.abtn{padding:6px 10px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--muted);min-height:34px;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent}
.abtn.pri{background:var(--bd);color:#fff;border-color:var(--bd)}
.abtn.grn{background:var(--tlL);color:var(--tl);border-color:var(--tlM)}
.abtn.red{background:var(--rl);color:var(--r);border-color:var(--rm)}
.vpills{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.vp{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--muted);white-space:nowrap;min-height:28px;display:flex;align-items:center}
.vp.on{background:var(--puL);border-color:var(--puM);color:var(--pu)}
.tab-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tb{padding:7px 12px;border-radius:20px;border:1.5px solid var(--brd);font-size:11px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);white-space:nowrap;min-height:36px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.tb.on{background:var(--bd);color:#fff;border-color:var(--bd)}
.card{background:var(--card);border:1.5px solid var(--brd);border-radius:14px;margin-bottom:10px;overflow:hidden}
.ch{padding:11px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.ci{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ct{font-size:12px;font-weight:700;color:var(--text)}
.cs{font-size:10px;color:var(--muted);margin-top:1px}
.cb{padding:13px 14px}
.fld{margin-bottom:10px}.fld:last-child{margin-bottom:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.g2:last-child{margin-bottom:0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.g3:last-child{margin-bottom:0}
label{display:block;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--brd);border-radius:9px;font-size:13px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bd)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
input[type=date]{min-height:42px}
hr.div{border:none;border-top:1px solid var(--brd);margin:12px 0}
.inote{padding:9px 12px;border-radius:9px;background:var(--bl);border-left:3px solid var(--bm);font-size:11px;color:var(--b);margin-bottom:10px;line-height:1.6}
.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:8px;color:var(--muted);text-align:center}
.es-icon{font-size:36px;margin-bottom:2px}
.es-txt{font-size:13px;font-weight:600}
.es-sub{font-size:11px;color:var(--sub)}
.nrs-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.nrs-lbl{font-size:11px;color:var(--muted);font-weight:600;min-width:110px}
.nrs-bts{display:flex;gap:2px}
.nb{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--brd);background:var(--bg);font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.body-wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
#bodyCanvas{border:1.5px solid var(--brd);border-radius:12px;background:var(--card);cursor:crosshair;touch-action:none;display:block;max-width:100%}
.mk-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.mkb{padding:6px 11px;border-radius:9px;border:1.5px solid var(--brd);font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);-webkit-tap-highlight-color:transparent;min-height:34px}
.leg{flex:1;min-width:140px}
.leg-i{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:6px;font-weight:500}
.leg-d{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.fm-t{width:100%;border-collapse:collapse;font-size:11px}
.fm-t th{padding:6px 7px;background:var(--bg);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:left;white-space:nowrap}
.fm-t td{padding:2px;border:1px solid var(--brd)}
.fm-t td input,.fm-t td select{border:none;background:transparent;font-size:11px;padding:5px 5px;color:var(--text);font-family:inherit;width:100%}
.fm-t td input:focus,.fm-t td select:focus{background:var(--bg);outline:none}
.pv-t{width:100%;border-collapse:collapse;font-size:11px}
.pv-t th{padding:5px 6px;background:var(--bg);font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:center;white-space:nowrap}
.pv-t td{padding:1px;border:1px solid var(--brd);text-align:center;background:var(--card)}
.pv-t td input{border:none;background:transparent;font-size:11px;padding:4px 2px;color:var(--text);font-family:inherit;text-align:center;width:100%;min-width:0}
.pv-t td input:focus{outline:none;background:var(--bg)}
/* RIGHT header — indigo */
.pv-t .pv-r  {background:var(--puL);color:var(--pu);font-size:10px;font-weight:800;letter-spacing:.06em}
/* LEFT header  — teal */
.pv-t .pv-l  {background:var(--tlL);color:var(--tl);font-size:10px;font-weight:800;letter-spacing:.06em}
/* CF sub-header — light grey with dark text */
.pv-t .pv-cf {background:#e8e6f0;color:#3730A3;font-size:8px;font-weight:700}
/* CC sub-header — light warm grey with dark text */
.pv-t .pv-cc {background:#e6f0ec;color:#065F46;font-size:8px;font-weight:700}
/* Thick divider between Right and Left groups */
.pv-t .pv-div   {border-left:3px solid var(--brd)!important}
.pv-t td.pv-div {border-left:3px solid var(--brd)!important}
/* Aliases kept for any remaining references */
.pv-t .pv-r-start,.pv-t td.r-start{border-left:3px solid var(--brd)!important}
.pv-t .pv-l-start,.pv-t td.l-start{border-left:3px solid var(--brd)!important}
.pv-t .pv-gh{background:var(--puL);color:var(--pu);font-size:8px;font-weight:700}
.pv-t .pv-go{background:var(--tlL);color:var(--tl);font-size:8px;font-weight:700}
.pv-t .pv-rcf,.pv-t .pv-lcf{background:#e8e6f0;color:#3730A3;font-size:8px;font-weight:700}
.pv-t .pv-rcc,.pv-t .pv-lcc{background:#e6f0ec;color:#065F46;font-size:8px;font-weight:700}
.pv-t td.rcf,.pv-t td.rcc,.pv-t td.lcf,.pv-t td.lcc,.pv-t td.cf,.pv-t td.cc{background:var(--card)}
.pv-t .pv-label{font-size:10px;font-weight:600;padding:5px 7px;text-align:left;white-space:nowrap;background:var(--bg)}
.hist-t{width:100%;border-collapse:collapse;font-size:11px}
.hist-t th{padding:6px 8px;background:var(--bg);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:left}
.hist-t td{padding:2px;border:1px solid var(--brd)}
.hist-t .rl{font-size:10px;font-weight:700;padding:6px 8px;white-space:nowrap;background:var(--bg);color:var(--text)}
.hist-t td input{border:none;background:transparent;font-size:11px;padding:5px 5px;color:var(--text);font-family:inherit;width:100%}
.hist-t td input:focus{background:var(--bg);outline:none}
.vm-t{width:100%;border-collapse:collapse;font-size:12px}
.vm-t th{padding:6px 8px;background:var(--bg);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:left}
.vm-t td{padding:3px;border:1px solid var(--brd)}
.vm-t td input,.vm-t td select{border:none;background:transparent;font-size:11px;padding:5px 5px;color:var(--text);font-family:inherit;width:100%}
.vm-t td input:focus,.vm-t td select:focus{background:var(--bg);outline:none}
.vm-sl{font-size:10px;font-weight:600;padding:5px 7px;white-space:nowrap}
.bl-line{display:grid;grid-template-columns:minmax(0,2fr) 60px 76px 76px 26px;gap:5px;align-items:center;margin-bottom:5px}
.bl-line input{padding:7px 9px;border:1.5px solid var(--brd);border-radius:9px;font-size:12px;background:var(--card);color:var(--text);font-family:inherit;width:100%}
.bl-line input:focus{outline:none;border-color:var(--bd)}
.bl-tot{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-top:10px}
.btr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--brd)}
.btr:last-child{border-bottom:none;font-weight:700;font-size:14px;padding-top:8px;margin-top:3px}
.sbadge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.sp{background:var(--tlL);color:var(--tl)}.su{background:var(--rl);color:var(--r)}.spt{background:var(--al);color:var(--a)}
.att-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px;margin-top:8px}
.att-c{border:1.5px solid var(--brd);border-radius:10px;overflow:hidden;background:var(--bg)}
.att-c img{width:100%;height:66px;object-fit:cover;display:block}
.att-nm{padding:4px 6px;font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-dl{padding:0 6px 4px;font-size:9px;color:var(--r);cursor:pointer}
.vm-g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.vm-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px}
.att-em{padding:24px;text-align:center;border:1.5px dashed var(--brd);border-radius:10px;color:var(--muted);font-size:11px}
/* ─── PATIENT TOP BAR ─── */
.pt-bar{display:flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--brd);border-radius:12px;padding:8px 10px;margin-bottom:8px;flex-wrap:wrap}
.pt-bar-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.pt-sel-wrap{position:relative;flex:1;min-width:0;max-width:320px;display:flex;align-items:center}
.pt-sel-wrap select{width:100%}
.pt-bar-right{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
@media(max-width:520px){.pt-bar{gap:5px}.pt-bar-right .abtn span:not(#dirtyBadge){display:none}}
</style>
</head>
<body>
<div class="wrap">
<div class="clinic-hdr">
  <div class="ch-top">
    <div class="ch-logo">BM</div>
    <div style="flex:1">
      <div class="ch-name" style="font-size:18px">Beyond Mechanics</div>
      <div class="ch-tag">Physical Therapy · Fascial Manipulation · Craniosacral Therapy</div>
      <div class="ch-sub" style="margin-top:3px">Healthvalley Hospital, Kondapur, Hitech City</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
      <select id="therapistSelect" onchange="setTherapist(this.value)"
        style="font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-family:inherit;-webkit-appearance:none;appearance:none;cursor:pointer;min-width:140px">
        <option value="">— Therapist —</option>
        <option value="Prem Anand PT">Prem Anand PT</option>
        <option value="P Aishwarya PT">P Aishwarya PT</option>
      </select>
      <span id="therapistLabel" style="font-size:9px;color:rgba(255,255,255,.5)">Select therapist to sign notes</span>
    </div>
  </div>
</div>
<!-- Patient top bar — replaces sidebar -->
<div class="pt-bar" id="ptBar">
  <div class="pt-bar-left">
    <div class="pt-sel-wrap">
      <select id="ptDropdown" onchange="selectPtFromDropdown(this.value)" style="flex:1;padding:8px 32px 8px 11px;border:1.5px solid var(--brd);border-radius:9px;font-size:12px;font-weight:600;background:var(--card);color:var(--text);font-family:inherit;appearance:none;-webkit-appearance:none;cursor:pointer;min-width:0">
        <option value="">— Select patient —</option>
      </select>
      <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px">▾</span>
    </div>
    <input id="ptSearch" type="text" placeholder="🔍 Search..." oninput="filterPts(this.value)"
      style="display:none;font-size:11px;padding:8px 10px;border:1.5px solid var(--bd);border-radius:9px;background:var(--card);color:var(--text);font-family:inherit;min-width:140px">
  </div>
  <div class="pt-bar-right">
    <button class="abtn grn" onclick="newPt()">＋ New</button>
    <button class="abtn" onclick="exportJSON()" title="Export backup">⬇</button>
    <button class="abtn" onclick="document.getElementById('importFile').click()" title="Import backup">⬆</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <button class="abtn sb-sync" id="syncBtn" onclick="syncServer()" title="Sync server" style="white-space:nowrap">
        ⟳ Sync
        <span id="dirtyBadge" style="display:none;background:#E24B4A;color:#fff;border-radius:20px;font-size:9px;padding:1px 5px;font-weight:700;margin-left:2px">●</span>
      </button>
      <span id="lastSyncedLabel" style="font-size:9px;color:var(--sub);white-space:nowrap;padding-right:2px"></span>
    </div>
    <button class="abtn" onclick="toggleServerPanel()" title="Server settings" id="srvToggle">⚙</button>
  </div>
</div>

<!-- Server settings panel — hidden by default, shown by ⚙ -->
<div id="serverPanel" style="display:none;background:var(--card);border:1.5px solid var(--brd);border-radius:12px;padding:12px 14px;margin-bottom:8px">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="flex:1;min-width:200px">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Server URL</div>
      <input id="serverUrl" type="text" placeholder="https://your-server.railway.app?token=..."
        style="width:100%;font-size:11px;padding:7px 10px;border:1.5px solid var(--brd);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit"
        oninput="saveServerUrl(this.value)">
    </div>
    <div style="flex-shrink:0;padding-top:18px">
      <div id="serverStatus" style="font-size:10px;color:var(--muted)">Not connected</div>
    </div>
  </div>
</div>

<div id="mainArea">
  <div class="empty-s">
    <div class="es-icon">🩺</div>
    <div class="es-txt">No patient selected</div>
    <div class="es-sub">Choose from the dropdown or tap ＋ New</div>
  </div>
</div>
</div>

<script>
/* ─── STATE ─── */
var DB = {
  patients: [],
  deletedIds: [],  /* IDs deleted locally — sent to server on sync */
  clinic: {name:'Beyond Mechanics',therapist:'',address:'Healthvalley Hospital, Kondapur, Hitech City',phone:'9032323890 / 6303896974',email:'beyondmechanicspt@gmail.com',currency:'₹',taxRate:0,taxLabel:'GST'}
};
try {
  var _s = localStorage.getItem('bm_v6');
  if (_s) {
    var _d = JSON.parse(_s);
    DB.patients = _d.patients || [];
    DB.deletedIds = _d.deletedIds || [];
    if (_d.clinic) { for (var _k in _d.clinic) { if (Object.prototype.hasOwnProperty.call(_d.clinic,_k)) DB.clinic[_k] = _d.clinic[_k]; } }
  }
} catch(e) {}

var CUR = null, CV = 0, CT = 'info', BMT = 'pain';

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function mkVisit() {
  return {
    id:gid(), date:new Date().toISOString().slice(0,10),
    chiefComplaint:'', existingConditions:'', currentMedications:'', similarHistory:'',
    painfulMovements:'', investigations:'', internalDysf:'', posture:'',
    si_pa:'', pa_conc:'', extremities:'',
    nrs:{ current:null, worst:null, best:null, avg:null, notes:'', sleep:'', activity:'', aggravating:'', relieving:'', psfs:[] },
    bodyChart:{ marks:[], notes:'' },
    fm:{
      segments:[], pvCoord:[], pvFusion:[],
      histPaPrev:[], histTrauma:[], histSurgery:[],
      historyNotes:'', hypothesis:'',
      moveVerify:'', palpVerify:'', treatmentNotes:''
    },
    msk:{ observation:'', rom:'', palpation:'', specialTests:'', outcomeMeasures:'', diagnosis:'', redFlags:{}, redFlagNotes:'' },
    vm:{ organs:{}, selectedOrgan:'', globalListening:'', localListening:'', internalDysf:'', technique:'', sessionResponse:'', notes:'' },
    cst:{ crRate:'', crQuality:'', sagittalSuture:'', coronalSuture:'', lambdoidSuture:'', sphenobasilar:'', temporals:'', frontal:'', parietals:'', occiput:'', dural:'', sbsSacral:'', sacrum:'', cv4:'', stillPointType:'', stillPointResp:'', techniques:'', unwinding:'', sessionResponse:'', notes:'', tmjOpen:'', tmjDeviation:'', tmjEndFeel:'', tmjClick:'', tmjPain:'', tmjMuscle:'', tmjNotes:'' },
    treatment:{ treatment:'', exerciseProgram:'', advice:'', lifestyle:'', followUp:'', sessionNumber:'' },
    attachments:[],
    billing:{ items:[], status:'unpaid', paymentMethod:'', paymentDate:'', notes:'', invoiceNo:'' }
  };
}

/* ─── PATIENT CRUD ─── */
function newPt() {
  var p = { id:gid(), info:{ name:'', age:'', gender:'', occupation:'' }, visits:[] };
  DB.patients.push(p);
  sv();
  CUR = p;
  CUR.visits.push(mkVisit());
  sv();
  CV = 0; CT = 'info';
  renderSB();
  renderMain();
}

function selectPt(id) {
  doCollect();
  var found = null;
  for (var i = 0; i < DB.patients.length; i++) { if (DB.patients[i].id === id) { found = DB.patients[i]; break; } }
  if (!found) return;
  CUR = found;
  if (!CUR.visits.length) { CUR.visits.push(mkVisit()); sv(); }
  CV = CUR.visits.length - 1;
  CT = 'info';
  renderSB();
  renderMain();
}

function addVisit() {
  if (!CUR) return;
  doCollect();
  CUR.visits.push(mkVisit());
  CV = CUR.visits.length - 1;
  sv();
  renderMain();
}

function switchVisit(i) {
  doCollect();
  CV = i;
  renderMain();
}

function deletePt() {
  if (!CUR) return;
  if (!confirm('Delete this patient and all records?')) return;
  var deletedId = CUR.id;
  var newList = [];
  for (var i = 0; i < DB.patients.length; i++) {
    if (DB.patients[i].id !== deletedId) newList.push(DB.patients[i]);
  }
  DB.patients = newList;
  /* Record deleted ID so server removes it on next sync */
  if (!DB.deletedIds) DB.deletedIds = [];
  if (DB.deletedIds.indexOf(deletedId) < 0) DB.deletedIds.push(deletedId);
  CUR = null;
  sv();
  /* If server is reachable, delete immediately */
  if (IS_ONLINE && SERVER_URL) {
    fetch(apiUrl('/delete'), {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: deletedId})
    }).then(function(r){
      if (r.ok) {
        /* Remove from deletedIds log once server confirmed */
        DB.deletedIds = DB.deletedIds.filter(function(id){return id!==deletedId;});
        sv();
        showToast('Patient deleted from server ✓');
      }
    }).catch(function(){
      showToast('Deleted locally — will remove from server on next sync');
    });
  } else {
    showToast('Deleted locally — will remove from server on next sync');
  }
  renderSB();
  document.getElementById('mainArea').innerHTML = '<div class="empty-s"><div class="es-icon">🩺</div><div class="es-txt">No patient selected</div><div class="es-sub">Select or add a patient</div></div>';
}

/* ─── COLLECT FORM DATA ─── */
function doCollect() {
  if (!CUR) return;
  var f = document.getElementById('ptForm');
  if (!f) return;
  var v = CUR.visits[CV];
  var pi = CUR.info;

  var els = f.querySelectorAll('[data-f]');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var path = el.dataset.f.split('.');
    var obj = v;
    for (var j = 0; j < path.length - 1; j++) {
      if (obj[path[j]] === undefined || obj[path[j]] === null) obj[path[j]] = {};
      obj = obj[path[j]];
    }
    obj[path[path.length-1]] = el.value;
  }

  var fmEls = f.querySelectorAll('[data-fm]');
  for (var i = 0; i < fmEls.length; i++) {
    var el = fmEls[i]; var p2 = el.dataset.fm.split('.');
    var idx = parseInt(p2[0],10); var key = p2[1];
    if (v.fm.segments[idx]) v.fm.segments[idx][key] = el.value;
  }

  var pvcEls = f.querySelectorAll('[data-pvc]');
  for (var i = 0; i < pvcEls.length; i++) {
    var el = pvcEls[i]; var p2 = el.dataset.pvc.split('.');
    var idx = parseInt(p2[0],10); var key = p2[1];
    if (v.fm.pvCoord[idx]) v.fm.pvCoord[idx][key] = el.value;
  }

  var histEls = f.querySelectorAll('[data-hist]');
  for (var i = 0; i < histEls.length; i++) {
    var el = histEls[i]; var p2 = el.dataset.hist.split('.');
    var cat = p2[0]; var ridx = parseInt(p2[1],10); var key = p2[2];
    var arr = cat==='pp' ? v.fm.histPaPrev : cat==='tr' ? v.fm.histTrauma : v.fm.histSurgery;
    if (!arr) { if(cat==='pp') v.fm.histPaPrev=[]; else if(cat==='tr') v.fm.histTrauma=[]; else v.fm.histSurgery=[]; arr = cat==='pp'?v.fm.histPaPrev:cat==='tr'?v.fm.histTrauma:v.fm.histSurgery; }
    if (arr && arr[ridx]) arr[ridx][key] = el.value;
  }

  var vmEls = f.querySelectorAll('[data-vm]');
  for (var i = 0; i < vmEls.length; i++) {
    var el = vmEls[i]; var p2 = el.dataset.vm.split('.');
    var organ = p2[0]; var key = p2[1];
    if (!v.vm.organs[organ]) v.vm.organs[organ] = {};
    v.vm.organs[organ][key] = el.value;
  }

  var blEls = f.querySelectorAll('[data-bl]');
  for (var i = 0; i < blEls.length; i++) {
    var el = blEls[i]; var p2 = el.dataset.bl.split('.');
    var idx = parseInt(p2[0],10); var key = p2[1];
    if (v.billing.items[idx]) v.billing.items[idx][key] = el.value;
  }

  var clEls = f.querySelectorAll('[data-cl]');
  for (var i = 0; i < clEls.length; i++) { DB.clinic[clEls[i].dataset.cl] = clEls[i].value; }

  var infoKeys = ['name','age','gender','occupation'];
  for (var i = 0; i < infoKeys.length; i++) {
    var el = f.querySelector('[data-info="'+infoKeys[i]+'"]');
    if (el) pi[infoKeys[i]] = el.value;
  }

  /* Red flags are saved immediately by toggleRedFlag() — no need to re-collect here */

  /* Update timestamp on the current patient so sync knows it changed */
  if (CUR) { CUR._local_updated = new Date().toISOString(); }

  sv();
}

    var p = pts[i];

    var nrs = (lastV && lastV.nrs && lastV.nrs.current !== null && lastV.nrs.current !== undefined)
              ? '  ·  NRS ' + lastV.nrs.current : '';
    var visits = ' (' + p.visits.length + ' visit' + (p.visits.length !== 1 ? 's' : '') + ')';
    opts += '<option value="' + p.id + '"' + (CUR && CUR.id === p.id ? ' selected' : '') + '>'

function initCanvas(v) {
  var c = document.getElementById('bodyCanvas');
  if (!c) return;

  /* Fix for retina/HiDPI displays — canvas looks blurry on iPad otherwise */
  var dpr = window.devicePixelRatio || 1;
  var logW = 260, logH = 300;
  c.width  = Math.round(logW * dpr);
  c.height = Math.round(logH * dpr);
  c.style.width  = logW + 'px';
  c.style.height = logH + 'px';
  var ctx2 = c.getContext('2d');
  ctx2.scale(dpr, dpr);

  function getPos(e) {
    var rect = c.getBoundingClientRect();
    /* Use logical CSS pixels for hit detection */
    var src = e.changedTouches ? e.changedTouches[0] : e;
    return {
      x: Math.round((src.clientX - rect.left) * (logW / rect.width)),
      y: Math.round((src.clientY - rect.top)  * (logH / rect.height))
    };
  }

  var tapped = false; /* prevent ghost click after touchend */

  function onTouch(e) {
    e.preventDefault();
    e.stopPropagation();
    tapped = true;
    var pos = getPos(e);
    handleTap(pos);
    setTimeout(function(){ tapped = false; }, 400);
  }

  function onClick(e) {
    if (tapped) return; /* already handled by touch */
    var pos = getPos(e);
    handleTap(pos);
  }

  function handleTap(pos) {
    if (!v.bodyChart) v.bodyChart = {marks:[], notes:''};
    var found = -1;
    for (var i = 0; i < v.bodyChart.marks.length; i++) {
      var m = v.bodyChart.marks[i];
      var dist = Math.sqrt((m.x-pos.x)*(m.x-pos.x)+(m.y-pos.y)*(m.y-pos.y));
      if (dist < 18) { found = i; break; }
    }
    if (found >= 0) v.bodyChart.marks.splice(found, 1);
    else v.bodyChart.marks.push({x: pos.x, y: pos.y, type: BMT});
    sv();
    drawBody(v);
  }

  c.addEventListener('touchend', onTouch, {passive: false});
  c.addEventListener('click', onClick);
  drawBody(v);
}

function drawBody(v) {
  var c = document.getElementById('bodyCanvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  /* Use logical CSS dimensions for all drawing */
  var W = parseFloat(c.style.width)  || 260;
  var H = parseFloat(c.style.height) || 300;
  ctx.clearRect(0, 0, W, H);
  var dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var skin=dark?'#2a3838':'#D4C5B0';
  var strk=dark?'#4a6868':'#A8937A';
  var divC=dark?'#3a5050':'#c8bfaf';

  function fig(cx){
    ctx.fillStyle=skin;ctx.strokeStyle=strk;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.ellipse(cx,22,14,16,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillRect(cx-5,37,10,9);ctx.strokeRect(cx-5,37,10,9);
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx-18,46,36,50,4);else ctx.rect(cx-18,46,36,50);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-18,50);ctx.lineTo(cx-30,90);ctx.lineTo(cx-24,92);ctx.lineTo(cx-12,53);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+18,50);ctx.lineTo(cx+30,90);ctx.lineTo(cx+24,92);ctx.lineTo(cx+12,53);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-30,90);ctx.lineTo(cx-32,122);ctx.lineTo(cx-26,123);ctx.lineTo(cx-24,92);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+30,90);ctx.lineTo(cx+32,122);ctx.lineTo(cx+26,123);ctx.lineTo(cx+24,92);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(cx-29,126,4,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(cx+29,126,4,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx-16,96,32,16,3);else ctx.rect(cx-16,96,32,16);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-8,112);ctx.lineTo(cx-10,158);ctx.lineTo(cx-4,158);ctx.lineTo(cx-2,112);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+8,112);ctx.lineTo(cx+10,158);ctx.lineTo(cx+4,158);ctx.lineTo(cx+2,112);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-10,158);ctx.lineTo(cx-9,192);ctx.lineTo(cx-3,192);ctx.lineTo(cx-4,158);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+10,158);ctx.lineTo(cx+9,192);ctx.lineTo(cx+3,192);ctx.lineTo(cx+4,158);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(cx-6,196,6,4,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(cx+6,196,6,4,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  }

  fig(65); fig(195);
  ctx.fillStyle=dark?'#6aacac':'#7a9898';
  ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('Anterior',65,214);ctx.fillText('Posterior',195,214);
  ctx.font='8px sans-serif';ctx.fillStyle=dark?'#3a5858':'#c0b0a0';
  ctx.fillText('L',42,210);ctx.fillText('R',88,210);
  ctx.fillText('R',172,210);ctx.fillText('L',218,210);
  ctx.strokeStyle=divC;ctx.lineWidth=0.6;ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(W/2,4);ctx.lineTo(W/2,210);ctx.stroke();
  ctx.setLineDash([]);
  var COLS={pain:'#E24B4A',numbness:'#534AB7',stiffness:'#BA7517',referred:'#1D9E75'};
  var marks=(v.bodyChart&&v.bodyChart.marks)?v.bodyChart.marks:[];
  for(var i=0;i<marks.length;i++){
    var m=marks[i]; var col=COLS[m.type]||'#E24B4A';
    ctx.fillStyle=col+'bb';ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(m.x,m.y,7,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(m.x-3,m.y-3);ctx.lineTo(m.x+3,m.y+3);ctx.moveTo(m.x+3,m.y-3);ctx.lineTo(m.x-3,m.y+3);ctx.stroke();
  }
}

function initNRS(v) {
  var n=v.nrs||{};
  var keys=['current','worst','best','avg'];
  for(var ki=0;ki<keys.length;ki++){
    var key=keys[ki];
    if(n[key]!==null&&n[key]!==undefined){
      var i=n[key]; var el=document.getElementById('nr_'+key+'_'+i);
      if(el){var col=i<=3?'#1D9E75':i<=6?'#BA7517':'#E24B4A';el.style.background=col;el.style.borderColor=col;el.style.color='#fff';}
    }
  }
}

function setNRS(key,val){
  if(!CUR)return;
  var v=CUR.visits[CV];
  if(!v.nrs)v.nrs={};
  v.nrs[key]=(v.nrs[key]===val)?null:val;
  sv();
  var keys=['current','worst','best','avg'];
  for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki];
    for(var i=0;i<=10;i++){
      var el=document.getElementById('nr_'+k+'_'+i); if(!el)continue;
      if(v.nrs[k]===i){var col=i<=3?'#1D9E75':i<=6?'#BA7517':'#E24B4A';el.style.background=col;el.style.borderColor=col;el.style.color='#fff';}
      else{el.style.background='';el.style.borderColor='';el.style.color='';}
    }
  }
}

function handleFiles(input){
  if(!CUR)return;
  var v=CUR.visits[CV];
  if(!v.attachments)v.attachments=[];
  var files=input.files; var total=files.length,done=0;
  for(var i=0;i<files.length;i++){
    (function(file){
      var reader=new FileReader();
      reader.onload=function(e){
        v.attachments.push({name:file.name,type:file.type,data:e.target.result,date:new Date().toLocaleDateString()});
        done++;if(done===total){sv();renderTab('files');}
      };
      reader.readAsDataURL(file);

/* ─── PRINT via Blob URL (fixes window.open / document.write errors) ─── */
function doPrint(type) {
  if (!CUR) return;
  var html = (type === 'note') ? buildNoteHTML() : buildBillHTML();
  var blob = new Blob([html], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  var win = window.open(url, '_blank');
  if (!win) { alert('Please allow pop-ups for this page, then tap the button again.'); URL.revokeObjectURL(url); return; }
  win.addEventListener('load', function() { URL.revokeObjectURL(url); });
}

function buildPVTable(pvC) {
  /* Only print columns that have at least one filled cell across all rows */
  var allKeys=['r_cf_anme','r_cf_rela','r_cf_anla','r_cf_reme',
               'r_cc_an','r_cc_re','r_cc_ir','r_cc_er','r_cc_me','r_cc_la',
               'l_cf_anme','l_cf_rela','l_cf_anla','l_cf_reme',
               'l_cc_an','l_cc_re','l_cc_ir','l_cc_er','l_cc_me','l_cc_la'];
  var cfKeys=['r_cf_anme','r_cf_rela','r_cf_anla','r_cf_reme','l_cf_anme','l_cf_rela','l_cf_anla','l_cf_reme'];
  var colLabels={
    'r_cf_anme':'AM','r_cf_rela':'RL','r_cf_anla':'AL','r_cf_reme':'RM',
    'r_cc_an':'An','r_cc_re':'Re','r_cc_ir':'Ir','r_cc_er':'Er','r_cc_me':'Me','r_cc_la':'La',
    'l_cf_anme':'AM','l_cf_rela':'RL','l_cf_anla':'AL','l_cf_reme':'RM',
    'l_cc_an':'An','l_cc_re':'Re','l_cc_ir':'Ir','l_cc_er':'Er','l_cc_me':'Me','l_cc_la':'La'
  };
  var side={
    'r_cf_anme':'R','r_cf_rela':'R','r_cf_anla':'R','r_cf_reme':'R',
    'r_cc_an':'R','r_cc_re':'R','r_cc_ir':'R','r_cc_er':'R','r_cc_me':'R','r_cc_la':'R',
    'l_cf_anme':'L','l_cf_rela':'L','l_cf_anla':'L','l_cf_reme':'L',
    'l_cc_an':'L','l_cc_re':'L','l_cc_ir':'L','l_cc_er':'L','l_cc_me':'L','l_cc_la':'L'
  };

  /* Find which columns have at least one non-empty value */
  var usedCols=[];
  for(var ki=0;ki<allKeys.length;ki++){
    var key=allKeys[ki];
    for(var ri=0;ri<pvC.length;ri++){
      if(pvC[ri][key]&&pvC[ri][key].trim()){usedCols.push(key);break;}
    }
  }
  if(!usedCols.length) return '';

  var th='font-size:8px;padding:4px 6px;border:1px solid #cdd;text-align:center;white-space:nowrap;';
  var td='font-size:11px;padding:4px 6px;border:1px solid #dde;text-align:center;';
  var hdrCF='background:#e8e6f0;color:#3730A3;font-weight:700;';
  var hdrCC='background:#e6f0ec;color:#065F46;font-weight:700;';
  var hdrR='background:#E0E7FF;color:#3730A3;font-weight:800;';
  var hdrL='background:#D1FAE5;color:#065F46;font-weight:800;';

  /* Build header row: Side label grouped */
  var rCols=usedCols.filter(function(k){return side[k]==='R';});
  var lCols=usedCols.filter(function(k){return side[k]==='L';});

  var tbl='<div style="margin-bottom:14px">'
    +'<div style="font-size:10px;font-weight:700;color:#075985;text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px;border-bottom:1.5px solid #dde2e2;margin-bottom:6px">PV — CC\'s &amp; CF\'s</div>'
    +'<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px"><thead>';

  /* Row 1: Date | Seg | RIGHT(n) | LEFT(m) */
  tbl+='<tr>'
    +'<th style="'+th+'min-width:48px" rowspan="3">Date</th>'
    +'<th style="'+th+'min-width:48px" rowspan="3">Seg</th>';
  if(rCols.length) tbl+='<th colspan="'+rCols.length+'" style="'+th+hdrR+'">RIGHT</th>';
  if(lCols.length) tbl+='<th colspan="'+lCols.length+'" style="'+th+hdrL+'">LEFT</th>';
  tbl+='</tr>';

  /* Row 2: CF's / CC's grouping */
  tbl+='<tr>';
  function addGroupHeaders(cols,hCF,hCC){
    var i=0;
    while(i<cols.length){
      var isCF=cfKeys.indexOf(cols[i])>=0;
      var j=i+1;
      while(j<cols.length&&(cfKeys.indexOf(cols[j])>=0)===isCF) j++;
      var span=j-i;
      tbl+='<th colspan="'+span+'" style="'+th+(isCF?hCF:hCC)+'">'+(isCF?'CF\'s':'CC\'s')+'</th>';
      i=j;
    }
  }
  addGroupHeaders(rCols,hdrCF,hdrCC);
  addGroupHeaders(lCols,hdrCF,hdrCC);
  tbl+='</tr>';

  /* Row 3: individual column labels */
  tbl+='<tr>';
  for(var ci=0;ci<usedCols.length;ci++){
    var isCF=cfKeys.indexOf(usedCols[ci])>=0;
    var isLeft=side[usedCols[ci]]==='L';
    var borderLeft=(ci>0&&isLeft&&side[usedCols[ci-1]]==='R')?'border-left:2px solid #aab;':'';
    tbl+='<th style="'+th+(isCF?hdrCF:hdrCC)+borderLeft+'">'+colLabels[usedCols[ci]]+'</th>';
  }
  tbl+='</tr></thead><tbody>';

  /* Data rows */
  for(var ri=0;ri<pvC.length;ri++){
    var r=pvC[ri];
    tbl+='<tr>'
      +'<td style="'+td+'font-size:10px">'+escHtml(r.date||'')+'</td>'
      +'<td style="'+td+'font-size:10px">'+escHtml(r.seg||'')+'</td>';
    for(var ci=0;ci<usedCols.length;ci++){
      var isLeft=side[usedCols[ci]]==='L';
      var borderLeft=(ci>0&&isLeft&&side[usedCols[ci-1]]==='R')?'border-left:2px solid #aab;':'';
      tbl+='<td style="'+td+borderLeft+'">'+escHtml(r[usedCols[ci]]||'')+'</td>';
    }
    tbl+='</tr>';
  }

  tbl+='</tbody></table></div></div>';
  return tbl;
}

/* ═══════════════════════════════════════════════════════════════
   OFFLINE-FIRST SYNC ENGINE
   ─────────────────────────────────────────────────────────────
   How it works:
   • All data lives in localStorage (always available, even offline)
   • Every patient edit is timestamped (updatedAt)
   • When server is reachable → sync merges by timestamp (newest wins)
   • When offline → keeps working, queues a "dirty" flag
   • At home on Wi-Fi → tap Sync Once to push everything to SQLite
   • Smart merge: never overwrites newer data with older data
   ═══════════════════════════════════════════════════════════════ */

var SERVER_URL = '';
var IS_ONLINE  = false;   /* true only when server is confirmed reachable */

try { SERVER_URL = localStorage.getItem('bm_server_url') || ''; } catch(e) {}

/* ── Timestamp every save ── */
function sv() {
  try {
    /* Mark each patient with the time it was last changed */
    var now = new Date().toISOString();
    for (var i = 0; i < DB.patients.length; i++) {
      if (!DB.patients[i]._local_updated) DB.patients[i]._local_updated = now;
    }
    localStorage.setItem('bm_v6', JSON.stringify(DB));
    localStorage.setItem('bm_dirty', '1');   /* flag: unsynced changes exist */
  } catch(e) {}
}

/* ── Mark a patient as just changed ── */
function touchPt(id) {
  var now = new Date().toISOString();
  for (var i = 0; i < DB.patients.length; i++) {
    if (DB.patients[i].id === id) { DB.patients[i]._local_updated = now; break; }
  }
}

/* ── Smart merge: newest version of each patient wins, deleted IDs excluded ── */
function mergePatients(local, remote) {
  /* Build a set of locally deleted IDs to exclude from server data */
  var deleted = {};
  var dids = DB.deletedIds || [];
  for (var i = 0; i < dids.length; i++) deleted[dids[i]] = true;

  var byId = {};
  for (var i = 0; i < local.length; i++) {
    if (!deleted[local[i].id]) byId[local[i].id] = local[i];
  }
  for (var i = 0; i < remote.length; i++) {
    var rp = remote[i];
    /* Skip patients that were deleted locally */
    if (deleted[rp.id]) continue;
    var lp = byId[rp.id];
    if (!lp) {
      /* Patient only on server → add locally */
      byId[rp.id] = rp;
    } else {
      /* Both have it → keep whichever is newer */
      var lt = lp._local_updated || lp._server_updated || '0';
      var rt = rp._server_updated || rp._local_updated || '0';
      if (rt > lt) byId[rp.id] = rp;
    }
  }
  var result = [];
  for (var k in byId) { if (Object.prototype.hasOwnProperty.call(byId, k)) result.push(byId[k]); }
  result.sort(function(a,b){ return (a.info&&a.info.name||'').localeCompare(b.info&&b.info.name||''); });
  return result;
}

/* ── Build API URL — appends ?token= if present in the saved URL ── */
function apiUrl(endpoint) {
  var base = SERVER_URL.replace(/\/$/, '');
  /* If the URL itself contains ?token=xxx, extract and reuse it */
  var tokenMatch = base.match(/[?&]token=([^&]+)/);
  var token = tokenMatch ? tokenMatch[1] : '';
  var cleanBase = base.split('?')[0];
  return cleanBase + endpoint + (token ? '?token=' + encodeURIComponent(token) : '');
}

/* ── Server URL ── */
function saveServerUrl(v) {
  SERVER_URL = v.trim();
  try { localStorage.setItem('bm_server_url', SERVER_URL); } catch(e) {}
}

function initServerUI() {
  var el = document.getElementById('serverUrl');

/* ── Connection status display ── */
function setStatus(msg, ok) {
  var el = document.getElementById('serverStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = ok === true ? '#0F6E56' : ok === false ? '#A32D2D' : '#5a6868';
  IS_ONLINE = (ok === true);
  updateSyncBadge();
  /* Update last synced label when a successful sync occurs */
  if (ok === true && msg.indexOf('Synced') === 0) {
    var now = new Date();
    var d = now.toLocaleDateString([], {day:'2-digit',month:'short',year:'numeric'});
    var t = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

function updateSyncBadge() {

  badge.style.display = dirty ? 'inline' : 'none';
  badge.title = dirty ? 'Unsynced changes — tap Sync when at home' : '';

/* ── SYNC (push local → server, pull merged result back) ── */
function syncServer() {
  if (!SERVER_URL) { showToast('Enter your home server URL first', true); return; }
  doCollect();
  var btn = document.getElementById('syncBtn');
  if (btn) btn.classList.add('syncing');
  setStatus('Syncing…');

  /* Tag all local patients with local timestamp before sending */
  var now = new Date().toISOString();
  var toSend = JSON.parse(JSON.stringify(DB.patients));
  for (var i = 0; i < toSend.length; i++) {
    if (!toSend[i]._local_updated) toSend[i]._local_updated = now;
  }

  fetch(apiUrl('/sync'), {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ patients: toSend, clinic: DB.clinic, deletedIds: DB.deletedIds || [] })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    if (data.patients) {
      /* Merge server response with local — newest wins per patient */
      var merged = mergePatients(DB.patients, data.patients);
      DB.patients = merged;
      if (data.clinic) {
        for (var k in data.clinic) {
          if (Object.prototype.hasOwnProperty.call(data.clinic, k)) DB.clinic[k] = data.clinic[k];
        }
      }
      /* Clear deletedIds — server has processed them */
      DB.deletedIds = [];
      /* Save merged result, clear dirty flag */
      try {
        localStorage.setItem('bm_v6', JSON.stringify(DB));
        localStorage.removeItem('bm_dirty');
      } catch(e) {}
      var prev = CUR ? CUR.id : null;
      CUR = null; CV = 0;
      renderSB();
      /* Re-select previously open patient if there was one */
      if (prev) {
        for (var i = 0; i < DB.patients.length; i++) {
          if (DB.patients[i].id === prev) { selectPt(prev); break; }
        }
      }
      if (!CUR) {
        document.getElementById('mainArea').innerHTML =
          '<div class="empty-s"><div class="es-icon">✅</div>'
          +'<div class="es-txt">Sync complete</div>'
          +'<div class="es-sub">'+merged.length+' patients · all data up to date</div></div>';
      }
    }
    setStatus('Synced ' + new Date().toLocaleTimeString(), true);
    showToast('Sync complete ✓ · ' + data.patients.length + ' patients');
  })
  .catch(function(err) {
    setStatus('Server unreachable', false);
    showToast('Cannot reach server — working offline', true);
  })
  .finally(function() {
    if (btn) btn.classList.remove('syncing');
  });
}

/* ── Silent background ping to check connectivity ── */
function pingServer() {
  if (!SERVER_URL) return;
  fetch(apiUrl('/ping'), { method: 'GET' })
    .then(function(r) {
      if (r.ok) {
        setStatus('Server reachable ✓', true);
        /* Auto-sync if there are pending changes and server just became available */
        var dirty = '';
        try { dirty = localStorage.getItem('bm_dirty') || ''; } catch(e) {}
        if (dirty) showToast('Server reachable — tap Sync to push clinic data');
      } else {
        setStatus('Server unreachable', false);
      }
    })
    .catch(function() { setStatus('Offline — clinic mode', false); });
}

/* ─── EXPORT / IMPORT JSON ─── */
function exportJSON() {
  doCollect();
  var payload = { version: 1, exported: new Date().toISOString(), clinic: DB.clinic, patients: DB.patients };
  var json  = JSON.stringify(payload, null, 2);
  var blob  = new Blob([json], { type: 'application/json' });
  var url   = URL.createObjectURL(blob);
  var a     = document.createElement('a');
  var d     = new Date();
  var stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  a.href     = url;
  a.download = 'BeyondMechanics_backup_' + stamp + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup downloaded ✓');
}

function importJSON(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.patients) { showToast('Invalid backup file', true); return; }
      var mode = confirm(
        'Import ' + data.patients.length + ' patients?\n\n' +
        'OK     = MERGE  (keep current + add from file, newest wins)\n' +
        'Cancel = REPLACE (wipe current and load file)'
      );
      if (mode) {
        var merged = mergePatients(DB.patients, data.patients);
        var added  = merged.length - DB.patients.length;
        DB.patients = merged;
        showToast('Merged · ' + added + ' new patients added ✓');
      } else {
        DB.patients = data.patients;
        if (data.clinic) {
          for (var k in data.clinic) {
            if (Object.prototype.hasOwnProperty.call(data.clinic, k)) DB.clinic[k] = data.clinic[k];
          }
        }
        CUR = null; CV = 0;
        showToast('Data replaced from backup ✓');
      }
      try { localStorage.setItem('bm_v6', JSON.stringify(DB)); localStorage.setItem('bm_dirty','1'); } catch(ex) {}
      renderSB();
      document.getElementById('mainArea').innerHTML =
        '<div class="empty-s"><div class="es-icon">✅</div><div class="es-txt">Import complete</div>'
        +'<div class="es-sub">Select a patient from the list</div></div>';
    } catch(err) {
      showToast('Import failed — invalid file', true);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

      if (obj[path[j]] === undefined || obj[path[j]] === null) obj[path[j]] = {};
      obj = obj[path[j]];
    }
    obj[path[path.length-1]] = el.value;
  }

  sv();

/* ─── NRS PROGRESS CHART ─── */
function drawNRSChart() {
  var canvas = document.getElementById('nrsChart');
  if (!canvas || !CUR) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 560;
  var H = 160;
  canvas.width = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, W, H);

  var dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  var gridCol = dark ? '#2a3636' : '#e8eeee';
  var textCol = dark ? '#7aacac' : '#5a6868';
  var lineCol = '#E24B4A';
  var dotCol  = '#534AB7';

  /* Collect current NRS scores across visits */
  var points = [];
  for (var i = 0; i < CUR.visits.length; i++) {
    var nrs = CUR.visits[i].nrs || {};
    var val = nrs.current;
    var lbl = i === 0 ? 'Initial' : 'FU ' + i;
    points.push({ label: lbl, value: val !== null && val !== undefined ? val : null });
  }

  var validPts = points.filter(function(p){ return p.value !== null; });
  var padL = 34, padR = 16, padT = 14, padB = 36;
  var plotW = W - padL - padR;
  var plotH = H - padT - padB;

  /* Grid lines 0,2,4,6,8,10 */
  ctx.strokeStyle = gridCol; ctx.lineWidth = 1;
  for (var g = 0; g <= 10; g += 2) {
    var y = padT + plotH - (g / 10) * plotH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
    ctx.fillStyle = textCol; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(g, padL - 4, y + 3);
  }

  if (validPts.length === 0) {
    ctx.fillStyle = textCol; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('No scores recorded yet', W / 2, H / 2);
    return;
  }

  /* X positions */
  var step = points.length > 1 ? plotW / (points.length - 1) : plotW / 2;
  var coords = [];
  for (var i = 0; i < points.length; i++) {
    var x = padL + (points.length > 1 ? i * step : plotW / 2);
    var y2 = points[i].value !== null ? padT + plotH - (points[i].value / 10) * plotH : null;
    coords.push({ x: x, y: y2, label: points[i].label, val: points[i].value });
  }

  /* Line */
  ctx.strokeStyle = lineCol; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  var started = false;
  for (var i = 0; i < coords.length; i++) {
    if (coords[i].y === null) continue;
    if (!started) { ctx.moveTo(coords[i].x, coords[i].y); started = true; }
    else ctx.lineTo(coords[i].x, coords[i].y);
  }
  ctx.stroke();

  /* Dots + labels */
  for (var i = 0; i < coords.length; i++) {
    if (coords[i].y === null) continue;
    /* Colour dot by severity */
    var v2 = coords[i].val;
    var dc = v2 <= 3 ? '#1D9E75' : v2 <= 6 ? '#BA7517' : '#E24B4A';
    ctx.fillStyle = dc; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(coords[i].x, coords[i].y, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    /* Score label above dot */
    ctx.fillStyle = textCol; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(coords[i].val, coords[i].x, coords[i].y - 8);
    /* X-axis label */
    ctx.font = '9px sans-serif';
    ctx.fillText(coords[i].label, coords[i].x, H - padB + 14);
  }
}

function setTherapist(name) {
  DB.clinic.therapist = name;
  sv();
  /* Update the label */
  var lbl = document.getElementById('therapistLabel');
  if (lbl) lbl.textContent = name ? '✓ ' + name : 'Select therapist to sign notes';
  /* Keep dropdown in sync */
  var sel = document.getElementById('therapistSelect');
  if (sel) sel.value = name || '';
}

function initTherapistUI() {
  var sel = document.getElementById('therapistSelect');
  if (sel && DB.clinic.therapist) {
    sel.value = DB.clinic.therapist;
    var lbl = document.getElementById('therapistLabel');
    if (lbl) lbl.textContent = '✓ ' + DB.clinic.therapist;
  }
}

/* ─── INIT ─── */
renderSB();
initServerUI();
updateSyncBadge();
initTherapistUI();
/* Ping server on load — silently checks if we're at home on Wi-Fi */
if (SERVER_URL) setTimeout(pingServer, 600);
/* Re-ping every 60 seconds in case connectivity changes */
setInterval(function() { if (SERVER_URL) pingServer(); }, 60000);
