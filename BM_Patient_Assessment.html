<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beyond Mechanics">
<meta name="theme-color" content="#2f5d8a">
<title>Beyond Mechanics — Patient Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bd:#2f5d8a;--b:#2f5d8a;--bl:#eef3f8;--bm:#c7d8e8;
  --tl:#2f7d6b;--tlL:#eaf4f1;--tlM:#c2ddd5;
  --a:#b07a1f;--al:#faf1e2;--am:#e6cfa3;
  --r:#b5453f;--rl:#f7ecea;--rm:#e6c4c1;
  --pu:#2f5d8a;--puL:#eef3f8;--puM:#c7d8e8;
  --bg:#f6f7f8;--card:#ffffff;--brd:#e6e9ec;--text:#18222b;--muted:#5b6770;--sub:#93a0a8;
  --cfBg:#e8e6f0;--cfFg:#3730A3;--ccBg:#e6f0ec;--ccFg:#065F46;
}
/* Dark surfaces — applied automatically in OS dark mode (auto), and forced by
   the theme toggle via html[data-theme]. Pastel backgrounds darken and accent
   text lightens to keep contrast; the navy brand colour (--bd) is kept. */
@media(prefers-color-scheme:dark){:root{
  --bg:#0f1418;--card:#171f26;--brd:#2a343d;--text:#e6edf2;--muted:#9aa7b1;--sub:#6b7882;
  --bl:#16242f;--bm:#33485c;
  --b:#9cc2e6;--pu:#9cc2e6;--puL:#16242f;--puM:#2a3f52;
  --tl:#7fd2bb;--tlL:#13241f;--tlM:#274a40;
  --a:#e0b768;--al:#2a2212;--am:#5a4a22;
  --r:#f0908a;--rl:#2a1717;--rm:#5a2f2f;
  --cfBg:#241f33;--cfFg:#b3aef0;--ccBg:#14241f;--ccFg:#7fd2bb
}}
html[data-theme="light"]{
  --bg:#f6f7f8;--card:#ffffff;--brd:#e6e9ec;--text:#18222b;--muted:#5b6770;--sub:#93a0a8;
  --bl:#eef3f8;--bm:#c7d8e8;
  --b:#2f5d8a;--pu:#2f5d8a;--puL:#eef3f8;--puM:#c7d8e8;
  --tl:#2f7d6b;--tlL:#eaf4f1;--tlM:#c2ddd5;
  --a:#b07a1f;--al:#faf1e2;--am:#e6cfa3;
  --r:#b5453f;--rl:#f7ecea;--rm:#e6c4c1;
  --cfBg:#e8e6f0;--cfFg:#3730A3;--ccBg:#e6f0ec;--ccFg:#065F46
}
html[data-theme="dark"]{
  --bg:#0f1418;--card:#171f26;--brd:#2a343d;--text:#e6edf2;--muted:#9aa7b1;--sub:#6b7882;
  --bl:#16242f;--bm:#33485c;
  --b:#9cc2e6;--pu:#9cc2e6;--puL:#16242f;--puM:#2a3f52;
  --tl:#7fd2bb;--tlL:#13241f;--tlM:#274a40;
  --a:#e0b768;--al:#2a2212;--am:#5a4a22;
  --r:#f0908a;--rl:#2a1717;--rm:#5a2f2f;
  --cfBg:#241f33;--cfFg:#b3aef0;--ccBg:#14241f;--ccFg:#7fd2bb
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:740px;margin:0 auto;padding:10px 10px 50px}
/* Laptop / desktop only (>=1024px): widen the column so tables and forms
   breathe. iPad portrait (768px) and phones stay below this breakpoint and
   are completely unaffected. */
@media(min-width:1024px){.wrap{max-width:1150px;padding:14px 18px 60px}}
.clinic-hdr{background:var(--bd);border-radius:16px;padding:15px 18px 13px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.clinic-hdr::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.ch-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ch-logo{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.ch-name{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.01em}
.ch-tag{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px}
.ch-tagline{font-size:10px;font-style:italic;color:rgba(255,255,255,.8);margin-top:3px;letter-spacing:.01em}
.ch-contact{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:7px}
.ch-contact span{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;color:rgba(255,255,255,.62);line-height:1.4}
.ch-badge{margin-left:auto;padding:3px 10px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);border-radius:20px;font-size:10px;font-weight:600;color:rgba(255,255,255,.75)}
.ch-sub{font-size:10px;color:rgba(255,255,255,.6);line-height:1.6;margin-top:1px}
.pt-card{background:var(--card);border:1.5px solid var(--brd);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.pt-top{display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap}
.pt-av{width:38px;height:38px;border-radius:10px;background:var(--puL);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--pu);flex-shrink:0}
.pt-nm{font-size:14px;font-weight:700}
.pt-mt{font-size:10px;color:var(--muted);margin-top:2px}
.pt-acts{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
.abtn{padding:6px 10px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--muted);min-height:34px;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent}
.abtn.pri{background:var(--bd);color:#fff;border-color:var(--bd)}
.abtn.grn{background:var(--tlL);color:var(--tl);border-color:var(--tlM)}
.abtn.red{background:var(--rl);color:var(--r);border-color:var(--rm)}
.vpills{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.vp{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid var(--brd);background:var(--card);color:var(--muted);white-space:nowrap;min-height:28px;display:flex;align-items:center}
.vp.on{background:var(--puL);border-color:var(--puM);color:var(--pu)}
.tab-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tb{padding:7px 12px;border-radius:20px;border:1.5px solid var(--brd);font-size:11px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);white-space:nowrap;min-height:36px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.tb.on{background:var(--bd);color:#fff;border-color:var(--bd)}
.card{background:var(--card);border:1.5px solid var(--brd);border-radius:14px;margin-bottom:10px;overflow:hidden}
.ch{padding:11px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.ci{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ct{font-size:12px;font-weight:700;color:var(--text)}
.cs{font-size:10px;color:var(--muted);margin-top:1px}
.cb{padding:13px 14px}
.fld{margin-bottom:10px}.fld:last-child{margin-bottom:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.g2:last-child{margin-bottom:0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.g3:last-child{margin-bottom:0}
label{display:block;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--brd);border-radius:9px;font-size:13px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bd)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
input[type=date]{min-height:42px}
hr.div{border:none;border-top:1px solid var(--brd);margin:12px 0}
.inote{padding:9px 12px;border-radius:9px;background:var(--bl);border-left:3px solid var(--bm);font-size:11px;color:var(--b);margin-bottom:10px;line-height:1.6}
.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:8px;color:var(--muted);text-align:center}
.es-icon{font-size:36px;margin-bottom:2px}
.es-txt{font-size:13px;font-weight:600}
.es-sub{font-size:11px;color:var(--sub)}
.nrs-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.nrs-lbl{font-size:11px;color:var(--muted);font-weight:600;min-width:110px}
.nrs-bts{display:flex;gap:2px}
.nb{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--brd);background:var(--bg);font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.body-wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
#bodyCanvas{border:1.5px solid var(--brd);border-radius:12px;background:var(--card);cursor:crosshair;touch-action:none;display:block;max-width:100%}
.mk-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.mkb{padding:6px 11px;border-radius:9px;border:1.5px solid var(--brd);font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);-webkit-tap-highlight-color:transparent;min-height:34px}
.leg{flex:1;min-width:140px}
.leg-i{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:6px;font-weight:500}
.leg-d{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.fm-t{width:100%;border-collapse:collapse;font-size:11px}
.fm-t th{padding:6px 7px;background:var(--bg);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:left;white-space:nowrap}
.fm-t td{padding:2px;border:1px solid var(--brd)}
.fm-t td input,.fm-t td select{border:none;background:transparent;font-size:11px;padding:5px 5px;color:var(--text);font-family:inherit;width:100%}
.fm-t td input:focus,.fm-t td select:focus{background:var(--bg);outline:none}
.pv-t{width:100%;border-collapse:collapse;font-size:11px}
.pv-t th{padding:5px 6px;background:var(--bg);font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:center;white-space:nowrap}
.pv-t td{padding:1px;border:1px solid var(--brd);text-align:center;background:var(--card)}
.pv-t td input{border:none;background:transparent;font-size:11px;padding:4px 2px;color:var(--text);font-family:inherit;text-align:center;width:100%;min-width:0}
.pv-t td input:focus{outline:none;background:var(--bg)}
/* RIGHT header — indigo */
.pv-t .pv-r  {background:var(--puL);color:var(--pu);font-size:10px;font-weight:800;letter-spacing:.06em}
/* LEFT header  — teal */
.pv-t .pv-l  {background:var(--tlL);color:var(--tl);font-size:10px;font-weight:800;letter-spacing:.06em}
/* CF sub-header — light grey with dark text */
.pv-t .pv-cf {background:var(--cfBg);color:var(--cfFg);font-size:8px;font-weight:700}
/* CC sub-header — light warm grey with dark text */
.pv-t .pv-cc {background:var(--ccBg);color:var(--ccFg);font-size:8px;font-weight:700}
/* Thick divider between Right and Left groups */
.pv-t .pv-div   {border-left:3px solid var(--brd)!important}
.pv-t td.pv-div {border-left:3px solid var(--brd)!important}
/* Aliases kept for any remaining references */
.pv-t .pv-r-start,.pv-t td.r-start{border-left:3px solid var(--brd)!important}
.pv-t .pv-l-start,.pv-t td.l-start{border-left:3px solid var(--brd)!important}
.pv-t .pv-gh{background:var(--puL);color:var(--pu);font-size:8px;font-weight:700}
.pv-t .pv-go{background:var(--tlL);color:var(--tl);font-size:8px;font-weight:700}
.pv-t .pv-rcf,.pv-t .pv-lcf{background:var(--cfBg);color:var(--cfFg);font-size:8px;font-weight:700}
.pv-t .pv-rcc,.pv-t .pv-lcc{background:var(--ccBg);color:var(--ccFg);font-size:8px;font-weight:700}
.pv-t td.rcf,.pv-t td.rcc,.pv-t td.lcf,.pv-t td.lcc,.pv-t td.cf,.pv-t td.cc{background:var(--card)}
.pv-t .pv-label{font-size:10px;font-weight:600;padding:5px 7px;text-align:left;white-space:nowrap;background:var(--bg)}
.hist-t{width:100%;border-collapse:collapse;font-size:11px}
.hist-t th{padding:6px 8px;background:var(--bg);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:left}
.hist-t td{padding:2px;border:1px solid var(--brd)}
.hist-t .rl{font-size:10px;font-weight:700;padding:6px 8px;white-space:nowrap;background:var(--bg);color:var(--text)}
.hist-t td input{border:none;background:transparent;font-size:11px;padding:5px 5px;color:var(--text);font-family:inherit;width:100%}
.hist-t td input:focus{background:var(--bg);outline:none}
.vm-t{width:100%;border-collapse:collapse;font-size:12px}
.vm-t th{padding:6px 8px;background:var(--bg);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--brd);text-align:left}
.vm-t td{padding:3px;border:1px solid var(--brd)}
.vm-t td input,.vm-t td select{border:none;background:transparent;font-size:11px;padding:5px 5px;color:var(--text);font-family:inherit;width:100%}
.vm-t td input:focus,.vm-t td select:focus{background:var(--bg);outline:none}
.vm-sl{font-size:10px;font-weight:600;padding:5px 7px;white-space:nowrap}
.bl-line{display:grid;grid-template-columns:minmax(0,2fr) 60px 76px 76px 26px;gap:5px;align-items:center;margin-bottom:5px}
.bl-line input{padding:7px 9px;border:1.5px solid var(--brd);border-radius:9px;font-size:12px;background:var(--card);color:var(--text);font-family:inherit;width:100%}
.bl-line input:focus{outline:none;border-color:var(--bd)}
.bl-tot{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-top:10px}
.btr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--brd)}
.btr:last-child{border-bottom:none;font-weight:700;font-size:14px;padding-top:8px;margin-top:3px}
.sbadge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.sp{background:var(--tlL);color:var(--tl)}.su{background:var(--rl);color:var(--r)}.spt{background:var(--al);color:var(--a)}
.att-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px;margin-top:8px}
.att-c{border:1.5px solid var(--brd);border-radius:10px;overflow:hidden;background:var(--bg)}
.att-c img{width:100%;height:66px;object-fit:cover;display:block}
.att-nm{padding:4px 6px;font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-dl{padding:0 6px 4px;font-size:9px;color:var(--r);cursor:pointer}
.vm-g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.vm-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px}
.att-em{padding:24px;text-align:center;border:1.5px dashed var(--brd);border-radius:10px;color:var(--muted);font-size:11px}
/* ─── PATIENT TOP BAR ─── */
.pt-bar{display:flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--brd);border-radius:12px;padding:8px 10px;margin-bottom:16px;flex-wrap:wrap}
.pt-bar-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0;position:relative}
#ptSuggest{position:absolute;top:100%;left:0;right:0;margin-top:5px;background:var(--card);border:1.5px solid var(--brd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);max-height:300px;overflow-y:auto;z-index:50;display:none}
#ptSuggest .sg{padding:9px 12px;font-size:12px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--brd);display:flex;flex-direction:column;gap:1px}
#ptSuggest .sg:last-child{border-bottom:none}
#ptSuggest .sg:hover,#ptSuggest .sg.active{background:var(--bl)}
#ptSuggest .sg small{font-size:10px;color:var(--muted)}
.pt-sel-wrap{position:relative;flex:1;min-width:0;max-width:320px;display:flex;align-items:center}
.pt-sel-wrap select{width:100%}
.pt-bar-right{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
@media(max-width:520px){.pt-bar{gap:5px}.pt-bar-right .abtn span:not(#dirtyBadge){display:none}}
/* Two-column flow on laptops only (>=1024px). Form-heavy tabs add .colflow to
   their form; wide content (tables, charts) gets .fullspan to span both
   columns so it is never squeezed. iPad/phone stay single-column. */
.colflow{column-gap:14px}
.colflow .card{break-inside:avoid;-webkit-column-break-inside:avoid}
.fullspan{break-inside:avoid;-webkit-column-break-inside:avoid}
@media(min-width:1024px){
  .colflow{column-count:2}
  .colflow .fullspan{column-span:all}
}
/* Larger, more legible type on laptops (the base sizes are tuned for phones).
   Untouched on tablet/phone. */
@media(min-width:1024px){
  input,select,textarea{font-size:14px;padding:10px 12px}
  label{font-size:10px}
  .ct{font-size:13px}.cs{font-size:11px}
  .cb{padding:15px 16px}
  .fld{margin-bottom:12px}
  textarea{line-height:1.65}
  .tb{font-size:12px;padding:8px 14px}
  .vp{font-size:11px}
  .inote{font-size:12px}
  .fm-t,.pv-t,.hist-t,.vm-t{font-size:12px}
  .fm-t td input,.fm-t td select,.hist-t td input,.vm-t td input,.vm-t td select{font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="clinic-hdr">
  <div class="ch-top">
    <div class="ch-logo">BM</div>
    <div style="flex:1">
      <div class="ch-name" style="font-size:18px;letter-spacing:.5px;text-transform:uppercase">BEYOND MECHANICS</div>
      <div class="ch-tagline">Breaking the cycle of Pain, Discomfort &amp; Dysfunction</div>
      <div class="ch-contact" id="hdrContact"></div>
    </div>
    <div style="text-align:right;flex-shrink:0" id="hdrTherapistBlock">
      <div id="therapistLabel" style="font-size:12px;font-weight:700;color:#fff;opacity:.9"></div>
      <div id="therapistQualLabel" style="font-size:8.5px;color:rgba(255,255,255,.5);margin-top:3px;max-width:240px;text-align:right;line-height:1.7;word-break:break-word"></div>
      <div id="therapistPhoneLabel" style="font-size:10px;color:rgba(255,255,255,.6);margin-top:3px"></div>
    </div>
  </div>
</div>
<!-- Patient top bar — replaces sidebar -->
<div class="pt-bar" id="ptBar">
  <div class="pt-bar-left">
    <div class="pt-sel-wrap">
      <select id="ptDropdown" onchange="selectPtFromDropdown(this.value)" style="flex:1;padding:8px 32px 8px 11px;border:1.5px solid var(--brd);border-radius:9px;font-size:12px;font-weight:600;background:var(--card);color:var(--text);font-family:inherit;appearance:none;-webkit-appearance:none;cursor:pointer;min-width:0">
        <option value="">— Select patient —</option>
      </select>
      <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px">▾</span>
    </div>
    <input id="ptSearch" type="text" placeholder="🔍 Search..." autocomplete="off"
      oninput="searchSuggest(this.value)" onfocus="searchSuggest(this.value)" onblur="setTimeout(hideSuggest,150)"
      style="font-size:11px;padding:8px 10px;border:1.5px solid var(--brd);border-radius:9px;background:var(--card);color:var(--text);font-family:inherit;flex:0 1 150px;min-width:90px">
    <div id="ptSuggest"></div>
  </div>
  <div class="pt-bar-right">
    <button class="abtn grn" onclick="newPt()">＋ New</button>
    <button class="abtn" onclick="exportJSON()" title="Export backup">⬇</button>
    <button class="abtn" onclick="document.getElementById('importFile').click()" title="Import backup">⬆</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    <div style="position:relative;display:flex;align-items:center">
      <button class="abtn sb-sync" id="syncBtn" onclick="syncServer()" title="Sync server" style="white-space:nowrap">
        ⟳ Sync
        <span id="dirtyBadge" style="display:none;background:#E24B4A;color:#fff;border-radius:20px;font-size:9px;padding:1px 5px;font-weight:700;margin-left:2px">●</span>
      </button>
      <span id="lastSyncedLabel" style="position:absolute;top:100%;right:0;margin-top:1px;font-size:9px;color:var(--sub);white-space:nowrap;pointer-events:none"></span>
    </div>
    <button class="abtn" onclick="cycleTheme()" title="Theme: Auto / Light / Dark" id="themeBtn">🌓</button>
    <button class="abtn" onclick="toggleServerPanel()" title="Server settings" id="srvToggle">⚙</button>
  </div>
</div>

<!-- Server settings panel — hidden by default, shown by ⚙ -->
<div id="serverPanel" style="display:none;background:var(--card);border:1.5px solid var(--brd);border-radius:12px;padding:12px 14px;margin-bottom:8px">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="flex:1;min-width:200px">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Server URL</div>
      <input id="serverUrl" type="text" placeholder="https://your-server.railway.app?token=..."
        style="width:100%;font-size:11px;padding:7px 10px;border:1.5px solid var(--brd);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit"
        oninput="saveServerUrl(this.value)">
    </div>
    <div style="flex-shrink:0;padding-top:18px">
      <div id="serverStatus" style="font-size:10px;color:var(--muted)">Not connected</div>
    </div>
  </div>
</div>

<div id="mainArea">
  <div class="empty-s">
    <div class="es-icon">🩺</div>
    <div class="es-txt">No patient selected</div>
    <div class="es-sub">Choose from the dropdown or tap ＋ New</div>
  </div>
</div>
</div>

<script>
/* ─── STATE ─── */
var DB = {
  patients: [],
  deletedIds: [],  /* IDs deleted locally — sent to server on sync */
  clinic: {name:'Beyond Mechanics',therapist:'',address:'Healthvalley Hospital, Kondapur, Hitech City',phone:'9032323890 / 6303896974',email:'beyondmechanicspt@gmail.com',currency:'₹',taxRate:0,taxLabel:'GST'}
};
try {
  var _s = localStorage.getItem('bm_v6');
  if (_s) {
    var _d = JSON.parse(_s);
    DB.patients = _d.patients || [];
    DB.deletedIds = _d.deletedIds || [];
    if (_d.clinic) { for (var _k in _d.clinic) { if (Object.prototype.hasOwnProperty.call(_d.clinic,_k)) DB.clinic[_k] = _d.clinic[_k]; } }
  }
} catch(e) {}

/* Migration: phone used to be stored per-visit under visit.nrs.phone.
   It's a patient-level detail, so lift it onto patient.info.phone once. */
try {
  for (var _pi = 0; _pi < DB.patients.length; _pi++) {
    var _p = DB.patients[_pi];
    if (!_p.info) _p.info = {};
    if (!_p.info.phone) {
      for (var _vi = 0; _vi < (_p.visits || []).length; _vi++) {
        var _vn = _p.visits[_vi] && _p.visits[_vi].nrs;
        if (_vn && _vn.phone) { _p.info.phone = _vn.phone; break; }
      }
    }
  }
} catch(e) {}

var CUR = null, CV = 0, CT = 'info', BMT = 'pain';

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function mkVisit() {
  return {
    id:gid(), date:new Date().toISOString().slice(0,10),
    chiefComplaint:'', existingConditions:'', currentMedications:'', similarHistory:'', surgeryHistory:'', traumaHistory:'', presentHistory:{onset:'',duration:'',progression:'',details:''},
    painfulMovements:'', investigations:'', internalDysf:'', posture:'',
    si_pa:'', pa_conc:'', extremities:'',
    nrs:{ current:null, worst:null, best:null, avg:null, notes:'', sleep:'', activity:'', aggravating:'', relieving:'', psfs:[] },
    bodyChart:{ marks:[], notes:'' },
    fm:{
      segments:[], pvCoord:[], pvFusion:[],
      histPaPrev:[], histTrauma:[], histSurgery:[],
      historyNotes:'', hypothesis:'',
      moveVerify:'', palpVerify:'', treatmentNotes:''
    },
    msk:{ observation:'', rom:'', palpation:'', specialTests:'', outcomeMeasures:'', diagnosis:'', redFlags:{}, redFlagNotes:'' },
    vm:{ organs:{}, selectedOrgan:'', globalListening:'', localListening:'', internalDysf:'', technique:'', sessionResponse:'', notes:'' },
    cst:{ crRate:'', crQuality:'', sagittalSuture:'', coronalSuture:'', lambdoidSuture:'', sphenobasilar:'', temporals:'', frontal:'', parietals:'', occiput:'', dural:'', sbsSacral:'', sacrum:'', cv4:'', stillPointType:'', stillPointResp:'', techniques:'', unwinding:'', sessionResponse:'', notes:'', tmjOpen:'', tmjDeviation:'', tmjEndFeel:'', tmjClick:'', tmjPain:'', tmjMuscle:'', tmjNotes:'' },
    treatment:{ treatment:'', exerciseProgram:'', advice:'', lifestyle:'', followUp:'', sessionNumber:'' },
    attachments:[],
    billing:{ items:[], status:'unpaid', paymentMethod:'', paymentDate:'', notes:'', invoiceNo:'' }
  };
}

/* ─── PATIENT CRUD ─── */
function newPt() {
  var p = { id:gid(), info:{ name:'', age:'', gender:'', occupation:'' }, visits:[] };
  DB.patients.push(p);
  sv();
  CUR = p;
  CUR.visits.push(mkVisit());
  sv();
  CV = 0; CT = 'info';
  renderSB();
  renderMain();
}

function selectPt(id) {
  doCollect();
  var found = null;
  for (var i = 0; i < DB.patients.length; i++) { if (DB.patients[i].id === id) { found = DB.patients[i]; break; } }
  if (!found) return;
  CUR = found;
  if (!CUR.visits.length) { CUR.visits.push(mkVisit()); sv(); }
  CV = CUR.visits.length - 1;
  CT = 'dash';
  renderSB();
  renderMain();
}

function addVisit() {
  if (!CUR) return;
  doCollect();
  var prev = CUR.visits.length ? CUR.visits[CUR.visits.length-1] : null;
  var nv = mkVisit();
  if (prev) carryForward(prev, nv);
  CUR.visits.push(nv);
  CV = CUR.visits.length - 1;
  sv();
  renderMain();
}

/* Carry persistent (patient-level) details into a new follow-up visit so they
   aren't re-typed. Visit-specific data (complaint, NRS scores, exam, treatment,
   billing, body-chart marks) is intentionally left blank. */
function carryForward(prev, nv) {
  var histKeys = ['similarHistory','existingConditions','surgeryHistory','traumaHistory','currentMedications'];
  for (var i = 0; i < histKeys.length; i++) nv[histKeys[i]] = prev[histKeys[i]] || '';
  /* PSFS: keep the same activities, reset scores for the new visit */
  if (prev.nrs && prev.nrs.psfs && prev.nrs.psfs.length) {
    nv.nrs.psfs = prev.nrs.psfs.map(function(p){ return { activity:(p&&p.activity)||'', score:'' }; });
  }
  /* FM persistent history tables */
  if (prev.fm) {
    var fmHist = ['histPaPrev','histTrauma','histSurgery'];
    for (var j = 0; j < fmHist.length; j++) {
      if (prev.fm[fmHist[j]] && prev.fm[fmHist[j]].length) nv.fm[fmHist[j]] = JSON.parse(JSON.stringify(prev.fm[fmHist[j]]));
    }
  }
}

function switchVisit(i) {
  doCollect();
  CV = i;
  renderMain();
}

function deletePt() {
  if (!CUR) return;
  if (!confirm('Delete this patient and all records?')) return;
  var deletedId = CUR.id;
  var newList = [];
  for (var i = 0; i < DB.patients.length; i++) {
    if (DB.patients[i].id !== deletedId) newList.push(DB.patients[i]);
  }
  DB.patients = newList;
  /* Record deleted ID so server removes it on next sync */
  if (!DB.deletedIds) DB.deletedIds = [];
  if (DB.deletedIds.indexOf(deletedId) < 0) DB.deletedIds.push(deletedId);
  CUR = null;
  sv();
  /* If server is reachable, delete immediately */
  if (IS_ONLINE && SERVER_URL) {
    fetch(apiUrl('/delete'), {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: deletedId})
    }).then(function(r){
      if (r.ok) {
        /* Remove from deletedIds log once server confirmed */
        DB.deletedIds = DB.deletedIds.filter(function(id){return id!==deletedId;});
        sv();
        showToast('Patient deleted from server ✓');
      }
    }).catch(function(){
      showToast('Deleted locally — will remove from server on next sync');
    });
  } else {
    showToast('Deleted locally — will remove from server on next sync');
  }
  renderSB();
  document.getElementById('mainArea').innerHTML = '<div class="empty-s"><div class="es-icon">🩺</div><div class="es-txt">No patient selected</div><div class="es-sub">Select or add a patient</div></div>';
}

/* ─── COLLECT FORM DATA ─── */
function doCollect() {
  if (!CUR) return;
  var f = document.getElementById('ptForm');
  if (!f) return;
  var v = CUR.visits[CV];
  var pi = CUR.info;

  var els = f.querySelectorAll('[data-f]');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var path = el.dataset.f.split('.');
    var obj = v;
    for (var j = 0; j < path.length - 1; j++) {
      if (obj[path[j]] === undefined || obj[path[j]] === null) obj[path[j]] = {};
      obj = obj[path[j]];
    }
    obj[path[path.length-1]] = el.value;
  }

  var fmEls = f.querySelectorAll('[data-fm]');
  for (var i = 0; i < fmEls.length; i++) {
    var el = fmEls[i]; var p2 = el.dataset.fm.split('.');
    var idx = parseInt(p2[0],10); var key = p2[1];
    if (v.fm.segments[idx]) v.fm.segments[idx][key] = el.value;
  }

  var pvcEls = f.querySelectorAll('[data-pvc]');
  for (var i = 0; i < pvcEls.length; i++) {
    var el = pvcEls[i]; var p2 = el.dataset.pvc.split('.');
    var idx = parseInt(p2[0],10); var key = p2[1];
    if (v.fm.pvCoord[idx]) v.fm.pvCoord[idx][key] = el.value;
  }

  var histEls = f.querySelectorAll('[data-hist]');
  for (var i = 0; i < histEls.length; i++) {
    var el = histEls[i]; var p2 = el.dataset.hist.split('.');
    var cat = p2[0]; var ridx = parseInt(p2[1],10); var key = p2[2];
    var arr = cat==='pp' ? v.fm.histPaPrev : cat==='tr' ? v.fm.histTrauma : v.fm.histSurgery;
    if (!arr) { if(cat==='pp') v.fm.histPaPrev=[]; else if(cat==='tr') v.fm.histTrauma=[]; else v.fm.histSurgery=[]; arr = cat==='pp'?v.fm.histPaPrev:cat==='tr'?v.fm.histTrauma:v.fm.histSurgery; }
    if (arr && arr[ridx]) arr[ridx][key] = el.value;
  }

  var vmEls = f.querySelectorAll('[data-vm]');
  for (var i = 0; i < vmEls.length; i++) {
    var el = vmEls[i]; var p2 = el.dataset.vm.split('.');
    var organ = p2[0]; var key = p2[1];
    if (!v.vm.organs[organ]) v.vm.organs[organ] = {};
    v.vm.organs[organ][key] = el.value;
  }

  var blEls = f.querySelectorAll('[data-bl]');
  for (var i = 0; i < blEls.length; i++) {
    var el = blEls[i]; var p2 = el.dataset.bl.split('.');
    var idx = parseInt(p2[0],10); var key = p2[1];
    if (v.billing.items[idx]) v.billing.items[idx][key] = el.value;
  }

  var clEls = f.querySelectorAll('[data-cl]');
  for (var i = 0; i < clEls.length; i++) { DB.clinic[clEls[i].dataset.cl] = clEls[i].value; }
  if (clEls.length && typeof renderClinicHeader === 'function') renderClinicHeader();

  var infoKeys = ['name','age','gender','occupation','location','referredBy','phone','email'];
  for (var i = 0; i < infoKeys.length; i++) {
    var el = f.querySelector('[data-info="'+infoKeys[i]+'"]');
    if (el) pi[infoKeys[i]] = el.value;
  }

  /* Red flags are saved immediately by toggleRedFlag() — no need to re-collect here */

  /* Update timestamp on the current patient so sync knows it changed */
  if (CUR) { CUR._local_updated = new Date().toISOString(); }

  return sv();
}

/* ─── RENDER SIDEBAR ─── */
function renderSB() {
  var dd = document.getElementById('ptDropdown');
  if (!dd) return;
  var q = (document.getElementById('ptSearch') || {}).value || '';
  var pts = DB.patients.slice().sort(function(a,b){
    return (a.info.name||'').localeCompare(b.info.name||'');
  });
  var opts = '<option value="">— Select patient —</option>';
  for (var i = 0; i < pts.length; i++) {
    var p = pts[i];
    var n = p.info.name || 'Unnamed';
    if (q && n.toLowerCase().indexOf(q.toLowerCase()) < 0) continue;
    var lastV = p.visits.length ? p.visits[p.visits.length-1] : null;
    var cc = (lastV && lastV.chiefComplaint) ? lastV.chiefComplaint.slice(0, 32) : '';
    var label = esc(n) + (cc ? '  —  ' + esc(cc) : '');
    opts += '<option value="' + p.id + '"' + (CUR && CUR.id === p.id ? ' selected' : '') + '>'
          + label + '</option>';
  }
  dd.innerHTML = opts;
  if (CUR) dd.value = CUR.id;
}

function filterPts(q) { renderSB(); }

/* Live search suggestions — type a name and pick the patient directly */
function searchSuggest(q) {
  var box = document.getElementById('ptSuggest');
  if (!box) return;
  q = (q || '').trim().toLowerCase();
  if (!q) { hideSuggest(); return; }
  var matches = DB.patients.filter(function(p){
    var n = (p.info && p.info.name || '').toLowerCase();
    var lastV = p.visits && p.visits.length ? p.visits[p.visits.length-1] : null;
    var cc = (lastV && lastV.chiefComplaint || '').toLowerCase();
    return n.indexOf(q) >= 0 || cc.indexOf(q) >= 0;
  }).sort(function(a,b){ return (a.info.name||'').localeCompare(b.info.name||''); });
  if (!matches.length) {
    box.innerHTML = '<div class="sg" style="cursor:default;color:var(--muted)">No matching patients</div>';
    box.style.display = 'block';
    return;
  }
  var html = '';
  for (var i = 0; i < matches.length && i < 15; i++) {
    var p = matches[i];
    var lastV = p.visits && p.visits.length ? p.visits[p.visits.length-1] : null;
    var cc = lastV && lastV.chiefComplaint ? lastV.chiefComplaint.slice(0,40) : '';
    html += '<div class="sg" onmousedown="pickSuggest(\''+p.id+'\')">'
      + esc(p.info.name || 'Unnamed')
      + (cc ? '<small>'+esc(cc)+'</small>' : '')
      + '</div>';
  }
  box.innerHTML = html;
  box.style.display = 'block';
}
function pickSuggest(id) {
  hideSuggest();
  var s = document.getElementById('ptSearch');
  if (s) s.value = '';
  selectPt(id);
}
function hideSuggest() {
  var box = document.getElementById('ptSuggest');
  if (box) { box.style.display = 'none'; box.innerHTML = ''; }
}

function selectPtFromDropdown(id) {
  if (!id) return;
  selectPt(id);
}

function toggleServerPanel() {
  var panel = document.getElementById('serverPanel');
  if (!panel) return;
  var shown = panel.style.display !== 'none';
  panel.style.display = shown ? 'none' : 'block';
  var btn = document.getElementById('srvToggle');
  if (btn) btn.style.background = shown ? '' : 'var(--puL)';
}

/* ─── RENDER MAIN ─── */
function renderMain() {
  if (!CUR) return;
  var pi = CUR.info;
  var ini = (pi.name ? pi.name.charAt(0).toUpperCase() : '?') + (pi.name && pi.name.split(' ')[1] ? pi.name.split(' ')[1].charAt(0).toUpperCase() : '');

  var pills = '';
  for (var i = 0; i < CUR.visits.length; i++) {
    var vi = CUR.visits[i];
    var viNRS = (vi.nrs && vi.nrs.current !== null && vi.nrs.current !== undefined) ? ' · '+vi.nrs.current : '';
    var viCol = viNRS ? (vi.nrs.current<=3?' style="color:#1D9E75"':vi.nrs.current<=6?' style="color:#BA7517"':' style="color:#E24B4A"') : '';
    pills += '<span class="vp'+(i===CV?' on':'')+'" onclick="switchVisit('+i+')">'+(i===0?'Initial':'FU '+i)+' &middot; '+vi.date+(viNRS?'<span'+viCol+'>'+viNRS+'</span>':'')+'</span>';
  }

  var TABS = [['dash','Overview','📈'],['info','Info','👤'],['body','Body chart','🩻'],['nrs','Pain NRS','📊'],['msk','Assessment','🩺'],['fm','FM',fmLogoSVG(15,true)],['vm','VM',stomachSVG(15,true)],['cst','CST',skullSVG(16)],['treatment','Treatment','💪'],['files','Files','📎'],['billing','Billing','🧾']];
  var tabHtml = '';
  for (var i = 0; i < TABS.length; i++) {
    tabHtml += '<span class="tb'+(TABS[i][0]===CT?' on':'')+'" onclick="switchTab(\''+TABS[i][0]+'\',this)"><span style="margin-right:5px">'+TABS[i][2]+'</span>'+TABS[i][1]+'</span>';
  }

  document.getElementById('mainArea').innerHTML =
    '<div class="pt-card">'
    +'<div class="pt-top">'
    +'<div class="pt-av">'+ini+'</div>'
    +'<div><div class="pt-nm" style="font-size:16px;font-weight:800">'+esc(pi.name||'New Patient')+'</div>'
    +'<div class="pt-mt" style="font-size:11px;margin-top:3px">'+(pi.age?pi.age+' yrs · ':'')+(pi.gender?esc(pi.gender)+' · ':'')+(pi.occupation?esc(pi.occupation):'')+'</div></div>'
    +'<div class="pt-acts">'
    +'<button class="abtn" onclick="addVisit()">＋ Visit</button>'
    +'<button class="abtn grn" onclick="openNotePicker()">🖨 Note</button>'
    +'<button class="abtn grn" onclick="doCollect();doPrint(\'bill\')">🧾 Bill</button>'
    +'<button class="abtn pri" id="saveBtn" onclick="doCollectAndSave()">Save</button>'
    +'<button class="abtn red" onclick="deletePt()">🗑</button>'
    +'</div></div>'
    +'<div class="vpills">'+pills+'</div>'
    +'</div>'
    +'<div class="tab-bar">'+tabHtml+'</div>'
    +'<div id="tabContent"></div>';

  renderTab(CT);
}

function switchTab(name, el) {
  doCollect();
  CT = name;
  var tabs = document.querySelectorAll('.tb');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('on');
  if (el) el.classList.add('on');
  renderTab(name);
}

function renderTab(name) {
  var c = document.getElementById('tabContent');
  if (!c || !CUR) return;
  var v = CUR.visits[CV];
  var pi = CUR.info;
  if      (name==='dash')      c.innerHTML = rDashboard(v);
  else if (name==='info')      c.innerHTML = rInfo(v,pi);
  else if (name==='body')      c.innerHTML = rBody(v);
  else if (name==='nrs')       c.innerHTML = rNRS(v);
  else if (name==='fm')        c.innerHTML = rFM(v);
  else if (name==='msk')       c.innerHTML = rMSK(v);
  else if (name==='vm')        c.innerHTML = rVM(v);
  else if (name==='cst')       c.innerHTML = rCST(v);
  else if (name==='treatment') c.innerHTML = rTreatment(v);
  else if (name==='files')     c.innerHTML = rFiles(v);
  else if (name==='billing')   c.innerHTML = rBilling(v);
  /* Two-column flow on laptops for form-heavy tabs (wide tables inside use
     .fullspan to keep full width). Single column on tablet/phone via CSS. */
  var twoColTabs = { info:1, msk:1, treatment:1, vm:1, cst:1, nrs:1, fm:1 };
  if (twoColTabs[name]) { var formEl = c.querySelector('#ptForm'); if (formEl) formEl.classList.add('colflow'); }
  if (name==='body') initCanvas(v);
  if (name==='nrs')  { initNRS(v); setTimeout(drawNRSChart, 50); }
  if (name==='dash') setTimeout(drawNRSChart, 50);
}

/* ─── DASHBOARD / OVERVIEW ─── */
function rDashboard(v) {
  var visits = CUR.visits || [];
  var last = visits.length ? visits[visits.length-1] : null;
  var latestNRS = last && last.nrs ? last.nrs.current : null;
  var pavg = last ? psfsAverage(last.nrs||{}) : null;
  var dxs=''; for (var di=visits.length-1; di>=0; di--){ if(visits[di].msk && visits[di].msk.diagnosis){ dxs=visits[di].msk.diagnosis; break; } }
  function nrsCol(val){ return val==null?'var(--muted)':val<=3?'#1D9E75':val<=6?'#BA7517':'#E24B4A'; }
  function tile(label,val,col){ return '<div style="flex:1;min-width:110px;background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:11px 13px">'
    +'<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+label+'</div>'
    +'<div style="font-size:18px;font-weight:800;color:'+(col||'var(--text)')+'">'+val+'</div></div>'; }
  var rows='';
  for (var i=visits.length-1; i>=0; i--){
    var vi=visits[i], n=vi.nrs||{}, pa=psfsAverage(n);
    rows+='<tr onclick="openVisit('+i+')" style="cursor:pointer">'
      +'<td style="padding:7px 8px;border-bottom:1px solid var(--brd);font-weight:700">'+(i===0?'Initial':'FU '+i)+'</td>'
      +'<td style="padding:7px 8px;border-bottom:1px solid var(--brd)">'+esc(vi.date||'')+'</td>'
      +'<td style="padding:7px 8px;border-bottom:1px solid var(--brd);text-align:center;font-weight:700;color:'+nrsCol(n.current)+'">'+(n.current!=null?n.current:'—')+'</td>'
      +'<td style="padding:7px 8px;border-bottom:1px solid var(--brd);text-align:center">'+(pa!=null?pa.toFixed(1):'—')+'</td>'
      +'<td style="padding:7px 8px;border-bottom:1px solid var(--brd);color:var(--muted);font-size:11px">'+esc((vi.chiefComplaint||'').slice(0,44))+'</td>'
      +'</tr>';
  }
  return '<div class="card"><div class="ch"><div class="ci" style="background:#E0F2FE">📈</div><div><div class="ct">Overview</div>'
    +'<div class="cs">'+visits.length+' visit'+(visits.length===1?'':'s')+(visits.length&&last?' · '+esc(visits[0].date)+' → '+esc(last.date):'')+'</div></div>'
    +'<button class="abtn" style="margin-left:auto" onclick="doPrint(\'full\')">📄 Full record</button>'
    +'</div><div class="cb">'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
    +tile('Latest pain (NRS)', latestNRS!=null?latestNRS+'/10':'—', nrsCol(latestNRS))
    +tile('Latest PSFS avg', pavg!=null?pavg.toFixed(1)+'/10':'—')
    +tile('Total visits', visits.length)
    +'</div>'
    +(dxs?'<div class="inote" style="margin-bottom:12px"><b>Working diagnosis:</b> '+esc(dxs)+'</div>':'')

/* ─── FIELD HELPERS ─── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fi(f,val,ph){ return '<input data-f="'+f+'" value="'+esc(val)+'" placeholder="'+(ph||'')+'" oninput="doCollect()" type="text">'; }
function fd(f,val)   { return '<input data-f="'+f+'" value="'+(val||'')+'" oninput="doCollect()" type="date">'; }
function ft(f,val,ph,h){ return '<textarea data-f="'+f+'" placeholder="'+(ph||'')+'" oninput="doCollect()" style="min-height:'+(h||72)+'px">'+esc(val)+'</textarea>'; }
function fsel(f,val,opts){
  var s='<select data-f="'+f+'" onchange="doCollect()"><option value="">—</option>';
  for(var i=0;i<opts.length;i++) s+='<option'+(val===opts[i]?' selected':'')+'>'+opts[i]+'</option>';
  return s+'</select>';
}

function setBMT(t) {
  BMT = t;
  var COLS = {pain:'#E24B4A',numbness:'#534AB7',stiffness:'#BA7517',referred:'#1D9E75'};
  var keys = ['pain','numbness','stiffness','referred'];
  for (var i=0;i<keys.length;i++) {
    var k=keys[i]; var el=document.getElementById('mkb_'+k); if(!el)continue;
    if(k===t){el.style.background=COLS[k];el.style.borderColor=COLS[k];el.style.color='#fff';}
    else{el.style.background='';el.style.borderColor='';el.style.color='';}
  }
}

function clearMarks() {
  if(!CUR)return;
  var v=CUR.visits[CV];
  if(!v.bodyChart)v.bodyChart={marks:[],notes:''};
  v.bodyChart.marks=[];
  sv();drawBody(v);
}

/* Marks are stored as normalized fractions (nx,ny in 0..1) so they stay
   aligned across phone / iPad / laptop and any canvas size. Legacy marks
   stored as absolute px (x,y) are converted on the fly using the old
   reference width (760 x 389) — best-effort for pre-existing data. */
function markNX(m){ return (m && m.nx!=null) ? m.nx : ((m&&m.x||0)/760); }
function markNY(m){ return (m && m.ny!=null) ? m.ny : ((m&&m.y||0)/389); }

function initCanvas(v) {
  var dpr=window.devicePixelRatio||1;
  var c=document.getElementById('bodyCanvas'); if(!c)return;
  var host=c.parentElement;
  var logW=Math.round((host&&host.clientWidth)||0); if(!logW||logW<320)logW=660; logW=Math.min(logW,1100);
  var logH=Math.round(logW*786/1536);
  /* Cap the backing store at the image's native resolution so it stays crisp
     without upscaling (preserves the uploaded chart's quality at any size). */
  var natW=BODY_IMG.naturalWidth||1536;
  var bsW=Math.min(Math.round(logW*dpr), natW);
  var bsH=Math.round(bsW*786/1536);
  c.width=bsW; c.height=bsH;
  c.style.width=logW+'px'; c.style.height=logH+'px';
  var ctx=c.getContext('2d'); ctx.setTransform(bsW/logW,0,0,bsH/logH,0,0);
  var tapped=false;
  function getPos(e){var rect=c.getBoundingClientRect();var src=e.changedTouches?e.changedTouches[0]:e;return{nx:(src.clientX-rect.left)/rect.width, ny:(src.clientY-rect.top)/rect.height};}
  function handleTap(pos){
    if(!v.bodyChart)v.bodyChart={marks:[],notes:''};
    var marks=v.bodyChart.marks;
    var curW=parseFloat(c.style.width)||logW, curH=parseFloat(c.style.height)||logH;
    var found=-1;
    for(var i=0;i<marks.length;i++){var m=marks[i];var dx=(markNX(m)-pos.nx)*curW, dy=(markNY(m)-pos.ny)*curH;if(Math.sqrt(dx*dx+dy*dy)<16){found=i;break;}}
    if(found>=0)marks.splice(found,1);
    else marks.push({nx:pos.nx,ny:pos.ny,type:BMT,canvas:'main'});
    sv();drawBody(v);
  }
  if(!c._bound){
    c._bound=true;
    c.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();tapped=true;handleTap(getPos(e));setTimeout(function(){tapped=false;},400);},{passive:false});
    c.addEventListener('click',function(e){if(tapped)return;handleTap(getPos(e));});
  }
  /* Redraw on rotate / window resize so the chart and markers stay correct */
  if(!window._bodyResizeBound){
    window._bodyResizeBound=true;
    var rT;
    window.addEventListener('resize',function(){
      clearTimeout(rT);
      rT=setTimeout(function(){ if(CT==='body'&&CUR&&CUR.visits[CV]) initCanvas(CUR.visits[CV]); },180);
    });
  }
  drawBody(v);
}

function drawBody(v) {
  var COLS={pain:'#E24B4A',numbness:'#534AB7',stiffness:'#BA7517',referred:'#1D9E75'};
  var c=document.getElementById('bodyCanvas'); if(!c)return;
  var ctx=c.getContext('2d');
  var W=parseFloat(c.style.width)||520, H=parseFloat(c.style.height)||266;
  ctx.clearRect(0,0,W,H);
  if(BODY_IMG.complete&&BODY_IMG.naturalWidth){ctx.drawImage(BODY_IMG,0,0,W,H);}
  else{ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);}
  var marks=(v.bodyChart&&v.bodyChart.marks)||[];
  for(var i=0;i<marks.length;i++){
    var m=marks[i]; if((m.canvas||'main')!=='main')continue;
    var mx=markNX(m)*W, my=markNY(m)*H;
    var col=COLS[m.type]||'#E24B4A';
    ctx.fillStyle=col+'bb';ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(mx,my,7,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(mx-3,my-3);ctx.lineTo(mx+3,my+3);ctx.moveTo(mx+3,my-3);ctx.lineTo(mx-3,my+3);ctx.stroke();
  }
}

/* Render the marked body chart to a PNG data URL for the printed note */
function bodyChartDataURL(v) {
  try{
    if(!BODY_IMG.complete||!BODY_IMG.naturalWidth) return '';
    var W=720, H=Math.round(W*786/1536);
    var c=document.createElement('canvas'); c.width=W; c.height=H;
    var ctx=c.getContext('2d');
    ctx.drawImage(BODY_IMG,0,0,W,H);
    var marks=(v.bodyChart&&v.bodyChart.marks)||[];
    var COLS={pain:'#E24B4A',numbness:'#534AB7',stiffness:'#BA7517',referred:'#1D9E75'};
    for(var i=0;i<marks.length;i++){
      var m=marks[i]; if((m.canvas||'main')!=='main')continue;
      var x=markNX(m)*W, y=markNY(m)*H, col=COLS[m.type]||'#E24B4A';
      ctx.fillStyle=col+'bb';ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(x-3,y-3);ctx.lineTo(x+3,y+3);ctx.moveTo(x+3,y-3);ctx.lineTo(x-3,y+3);ctx.stroke();
    }
    return c.toDataURL('image/png');
  }catch(e){ return ''; }
}

    for(var i=0;i<=10;i++){

      html+='<button type="button" class="nb" id="nr_'+key+'_'+i+'"'+sel+' onclick="setNRS(\''+key+'\','+i+')">'+i+'</button>';
    }
    return html+'</div></div>';

  return '<form id="ptForm" onsubmit="return false">'
  +'<div class="card"><div class="ch"><div class="ci" style="background:#FCEBEB">📊</div><div><div class="ct">Numeric rating scale (0–10)</div></div></div><div class="cb">'
  +'<div style="display:flex;gap:10px;font-size:10px;font-weight:700;margin-bottom:10px"><span style="color:#1D9E75">■ 0–3 Mild</span><span style="color:#BA7517">■ 4–6 Moderate</span><span style="color:#E24B4A">■ 7–10 Severe</span></div>'
  +nrsRow('Current pain','current')+nrsRow('Worst (24h)','worst')+nrsRow('Best (24h)','best')+nrsRow('Average (24h)','avg')
  +'<hr class="div"><div class="fld"><label>Pain quality notes</label>'+ft('nrs.notes',n.notes,'Aching, burning, sharp, throbbing...',60)+'</div>'
  +'</div></div>'
  +'<div class="card"><div class="ch"><div class="ci" style="background:#FAEEDA">🎯</div>'
  +'<div><div class="ct">Patient-specific functional scale (PSFS)</div><div class="cs">0 = unable · 10 = normal · scored each visit</div></div></div><div class="cb">'
  +'<div class="fld" style="margin-bottom:10px"><div style="display:grid;grid-template-columns:minmax(0,2fr) 80px;gap:8px;align-items:center;margin-bottom:5px">'
  +'<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Activity</div>'
  +'<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Score (0–10)</div></div>'
  +psfsRows(n)+'</div>'
  +'</div></div>'
  +'<div class="card"><div class="ch"><div class="ci" style="background:#FAEEDA">🏃</div><div><div class="ct">Functional impact</div></div></div><div class="cb">'
  +'<div class="g2"><div class="fld"><label>Sleep</label>'+fsel('nrs.sleep',n.sleep,['None','Mild','Moderate','Severe'])+'</div>'
  +'<div class="fld"><label>Activity</label>'+fsel('nrs.activity',n.activity,['None','Mild','Moderate','Severe'])+'</div></div>'
  +'<div class="g2"><div class="fld"><label>Aggravating factors</label>'+ft('nrs.aggravating',n.aggravating,'',56)+'</div>'
  +'<div class="fld"><label>Relieving factors</label>'+ft('nrs.relieving',n.relieving,'',56)+'</div></div>'
  +'</div></div>'
  +'<div class="card fullspan"><div class="ch"><div class="ci" style="background:#E0F2FE">📈</div>'
  +'<div><div class="ct">Progress chart</div><div class="cs">NRS current pain across all visits</div></div></div><div class="cb">'
  +'<canvas id="nrsChart" width="560" height="160" style="width:100%;height:auto;max-height:160px"></canvas>'
  +'</div></div>'
  +'</form>';
}

function initNRS(v) {
  var n=v.nrs||{};
  var keys=['current','worst','best','avg'];
  for(var ki=0;ki<keys.length;ki++){
    var key=keys[ki];
    if(n[key]!==null&&n[key]!==undefined){
      var i=n[key]; var el=document.getElementById('nr_'+key+'_'+i);
      if(el){var col=i<=3?'#1D9E75':i<=6?'#BA7517':'#E24B4A';el.style.background=col;el.style.borderColor=col;el.style.color='#fff';}
    }
  }
}

function setNRS(key,val){
  if(!CUR)return;
  var v=CUR.visits[CV];
  if(!v.nrs)v.nrs={};
  v.nrs[key]=(v.nrs[key]===val)?null:val;
  sv();
  var keys=['current','worst','best','avg'];
  for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki];
    for(var i=0;i<=10;i++){
      var el=document.getElementById('nr_'+k+'_'+i); if(!el)continue;
      if(v.nrs[k]===i){var col=i<=3?'#1D9E75':i<=6?'#BA7517':'#E24B4A';el.style.background=col;el.style.borderColor=col;el.style.color='#fff';}
      else{el.style.background='';el.style.borderColor='';el.style.color='';}
    }
  }
}

function rMSK(v) {

  var rfList=[
    ['neurological','Neurological signs (numbness, weakness, bladder/bowel)'],
    ['weightLoss','Unexplained weight loss'],
    ['fever','Fever / systemic illness'],
    ['trauma','Recent significant trauma'],
    ['cancer','History of cancer'],
    ['nightPain','Night pain / constant pain unrelated to movement'],
    ['caudalEquina','Cauda equina symptoms'],
  ];
  var rfHtml='<div style="display:flex;flex-direction:column;gap:6px">';
  for(var ri=0;ri<rfList.length;ri++){
    var rfKey=rfList[ri][0]; var rfLabel=rfList[ri][1];
    var isChecked=(rf[rfKey]==='1');
    /* iOS fix: use div+onclick, not label+input+onchange */
    rfHtml+='<div onclick="toggleRedFlag(\''+rfKey+'\')" style="display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;border:1.5px solid '+(isChecked?'#E24B4A':'var(--brd)')+';background:'+(isChecked?'#FCEBEB':'var(--card)')+';cursor:pointer;-webkit-tap-highlight-color:transparent">'

        +(isChecked?'<span style="color:#fff;font-weight:800;font-size:13px;line-height:1">✓</span>':'')+'</div>'
        +'<span style="font-size:12px;font-weight:500;color:'+(isChecked?'#7A1A1A':'var(--text)')+'">'+rfLabel+'</span>'
        +'</div>';
  }
  rfHtml+='</div>';
  return '<form id="ptForm" onsubmit="return false">'
  +'<div class="inote">Fill in what is relevant — sections can be left blank.</div>'

/* Downscale + re-encode a photo before storing so far more scans fit in the
   ~5MB localStorage budget. Falls back to the original if anything fails or
   the compressed version isn't actually smaller. */
function compressImage(file, cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var orig=e.target.result;
    var img=new Image();
    img.onload=function(){
      try{
        var MAX=1600;
        var w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(w>MAX||h>MAX){ var sc=Math.min(MAX/w,MAX/h); w=Math.round(w*sc); h=Math.round(h*sc); }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        var out=c.toDataURL('image/jpeg',0.82);
        if(out && out.length < orig.length) cb(out,'image/jpeg');
        else cb(orig, file.type);
      }catch(err){ cb(orig, file.type); }
    };
    img.onerror=function(){ cb(orig, file.type); };
    img.src=orig;
  };
  reader.onerror=function(){ cb(null,null); };
  reader.readAsDataURL(file);
}

function handleFiles(input){
  if(!CUR)return;
  var v=CUR.visits[CV];
  if(!v.attachments)v.attachments=[];
  var startLen=v.attachments.length;
  var files=input.files; var total=files.length,done=0;
  function finalize(){
    done++;
    if(done===total){
      /* If the save fails (e.g. storage full), drop the new files rather
         than leave them in memory pretending they were saved. */
      if(!sv()) v.attachments.length=startLen;
      renderTab('files');
    }
  }
  for(var i=0;i<files.length;i++){
    (function(file){
      if(file.type && file.type.indexOf('image/')===0 && file.type.indexOf('image/svg')!==0){
        compressImage(file,function(data,type){
          if(data) v.attachments.push({name:file.name,type:type||file.type,data:data,date:new Date().toLocaleDateString()});
          finalize();
        });
      } else {
        var reader=new FileReader();
        reader.onload=function(e){
          v.attachments.push({name:file.name,type:file.type,data:e.target.result,date:new Date().toLocaleDateString()});
          finalize();
        };
        reader.onerror=function(){ finalize(); };
        reader.readAsDataURL(file);
      }
    })(files[i]);
  }
  input.value='';   /* let the same file be re-selected later */
}
function removeFile(i){if(!CUR)return;CUR.visits[CV].attachments.splice(i,1);sv();renderTab('files');}

/* ── Storage usage (localStorage is the only store; ~5MB budget) ── */
function fmtBytes(n){ if(n<1024)return n+' B'; if(n<1048576)return (n/1024).toFixed(0)+' KB'; return (n/1048576).toFixed(2)+' MB'; }
function storageUsage(){
  var used=0;
  try{ used=(localStorage.getItem('bm_v6')||'').length; }catch(e){}
  var limit=5*1024*1024;
  return { used:used, limit:limit, pct:Math.min(100, Math.round(used/limit*100)) };
}

  var el=document.getElementById('blStatusBadge'); if(!el)return;
  el.className='sbadge '+(val==='paid'?'sp':val==='partial'?'spt':'su');
  el.textContent=(val||'unpaid').toUpperCase();
}
function recalcBill(){
  if(!CUR)return;
  var v=CUR.visits[CV]; if(!v||!v.billing)return;
  var items=v.billing.items||[];
  var cur=DB.clinic.currency||'₹';
  var tax=parseFloat(DB.clinic.taxRate)||0;
  var sub=0;
  for(var i=0;i<items.length;i++){
    var amt=(parseFloat(items[i].qty)||0)*(parseFloat(items[i].rate)||0);
    sub+=amt;
    var el=document.getElementById('blAmt'+i); if(el)el.value=cur+amt.toFixed(2);
  }
  var taxAmt=sub*(tax/100); var total=sub+taxAmt;
  var s=document.getElementById('blSub'); if(s)s.textContent=cur+sub.toFixed(2);
  var ta=document.getElementById('blTaxAmt'); if(ta)ta.textContent=cur+taxAmt.toFixed(2);
  var t=document.getElementById('blTot'); if(t)t.textContent=cur+total.toFixed(2);
}
function addLine(){if(!CUR)return;doCollect();var v=CUR.visits[CV];if(!v.billing)v.billing={items:[]};v.billing.items.push({desc:'',qty:1,rate:''});sv();renderTab('billing');}
function removeLine(i){if(!CUR)return;doCollect();CUR.visits[CV].billing.items.splice(i,1);sv();renderTab('billing');}

var NOTE_SECTIONS = [
  ['present',  'Present history'],
  ['past',     'Past history (comorbidities, meds, surgery, trauma)'],
  ['pain',     'Pain scores (NRS)'],
  ['psfs',     'PSFS & functional impact'],
  ['bodychart','Body chart (marked image)'],
  ['exam',     'Examination (observation, ROM, palpation, special tests)'],
  ['diagnosis','Diagnosis / differential'],
  ['redflags', 'Red flag screening'],
  ['fm',       'FM (segments, hypothesis, palpation table)'],
  ['vm',       'Visceral (VM) findings'],
  ['cst',      'Craniosacral (CST) findings'],
  ['treatment','Treatment & plan']
];
function getNoteSections(){
  var def={}; for(var i=0;i<NOTE_SECTIONS.length;i++) def[NOTE_SECTIONS[i][0]]=true;
  try{ var s=JSON.parse(localStorage.getItem('bm_note_sec')||'{}'); for(var k in s){ if(Object.prototype.hasOwnProperty.call(s,k)) def[k]=!!s[k]; } }catch(e){}
  return def;
}
function openNotePicker(){
  if(!CUR)return;
  doCollect();
  var sec=getNoteSections();
  var rows='';
  for(var i=0;i<NOTE_SECTIONS.length;i++){
    var k=NOTE_SECTIONS[i][0];
    rows+='<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;border:1.5px solid var(--brd);margin-bottom:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0">'
      +'<input type="checkbox" data-nsec="'+k+'"'+(sec[k]?' checked':'')+' style="width:18px;height:18px;flex-shrink:0;-webkit-appearance:auto;appearance:auto">'
      +'<span>'+NOTE_SECTIONS[i][1]+'</span></label>';
  }
  var ov=document.createElement('div');
  ov.id='notePickerOverlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px';
  ov.innerHTML='<div style="background:var(--card);border-radius:16px;max-width:430px;width:100%;max-height:85vh;overflow:auto;padding:18px">'
    +'<div style="font-size:15px;font-weight:800;margin-bottom:3px;color:var(--text)">Print consultation note</div>'
    +'<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Choose sections to include. Chief complaint is always included; empty sections are skipped automatically.</div>'
    +rows
    +'<div style="display:flex;gap:8px;margin-top:14px">'
    +'<button class="abtn" style="flex:1;justify-content:center" onclick="closeNotePicker()">Cancel</button>'
    +'<button class="abtn pri" style="flex:1;justify-content:center" onclick="confirmNotePrint()">🖨 Print</button>'
    +'</div></div>';
  ov.addEventListener('click',function(e){ if(e.target===ov) closeNotePicker(); });

}
function closeNotePicker(){ var o=document.getElementById('notePickerOverlay'); if(o&&o.parentNode) o.parentNode.removeChild(o); }
function confirmNotePrint(){
  var o=document.getElementById('notePickerOverlay');
  if(o){ var cbs=o.querySelectorAll('[data-nsec]'); var sel={}; for(var i=0;i<cbs.length;i++) sel[cbs[i].dataset.nsec]=cbs[i].checked;
    try{ localStorage.setItem('bm_note_sec', JSON.stringify(sel)); }catch(e){} }
  closeNotePicker();
  doPrint('note');
}

/* ─── PRINT via Blob URL (fixes window.open / document.write errors) ─── */
function doPrint(type) {
  if (!CUR) return;
  var html = (type === 'note') ? buildNoteHTML() : (type === 'full') ? buildFullRecordHTML() : buildBillHTML();
  var blob = new Blob([html], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  var win = window.open(url, '_blank');
  if (!win) { alert('Please allow pop-ups for this page, then tap the button again.'); URL.revokeObjectURL(url); return; }
  win.addEventListener('load', function() { URL.revokeObjectURL(url); });
}

function buildPVTable(pvC) {
  /* Only print columns that have at least one filled cell across all rows */
  var allKeys=['r_cf_anme','r_cf_rela','r_cf_anla','r_cf_reme',
               'r_cc_an','r_cc_re','r_cc_ir','r_cc_er','r_cc_me','r_cc_la',
               'l_cf_anme','l_cf_rela','l_cf_anla','l_cf_reme',
               'l_cc_an','l_cc_re','l_cc_ir','l_cc_er','l_cc_me','l_cc_la'];
  var cfKeys=['r_cf_anme','r_cf_rela','r_cf_anla','r_cf_reme','l_cf_anme','l_cf_rela','l_cf_anla','l_cf_reme'];
  var colLabels={
    'r_cf_anme':'AM','r_cf_rela':'RL','r_cf_anla':'AL','r_cf_reme':'RM',
    'r_cc_an':'An','r_cc_re':'Re','r_cc_ir':'Ir','r_cc_er':'Er','r_cc_me':'Me','r_cc_la':'La',
    'l_cf_anme':'AM','l_cf_rela':'RL','l_cf_anla':'AL','l_cf_reme':'RM',
    'l_cc_an':'An','l_cc_re':'Re','l_cc_ir':'Ir','l_cc_er':'Er','l_cc_me':'Me','l_cc_la':'La'
  };
  var side={
    'r_cf_anme':'R','r_cf_rela':'R','r_cf_anla':'R','r_cf_reme':'R',
    'r_cc_an':'R','r_cc_re':'R','r_cc_ir':'R','r_cc_er':'R','r_cc_me':'R','r_cc_la':'R',
    'l_cf_anme':'L','l_cf_rela':'L','l_cf_anla':'L','l_cf_reme':'L',
    'l_cc_an':'L','l_cc_re':'L','l_cc_ir':'L','l_cc_er':'L','l_cc_me':'L','l_cc_la':'L'
  };

  /* Find which columns have at least one non-empty value */
  var usedCols=[];
  for(var ki=0;ki<allKeys.length;ki++){
    var key=allKeys[ki];
    for(var ri=0;ri<pvC.length;ri++){
      if(pvC[ri][key]&&pvC[ri][key].trim()){usedCols.push(key);break;}
    }
  }
  if(!usedCols.length) return '';

  var th='font-size:8px;padding:4px 6px;border:1px solid #cdd;text-align:center;white-space:nowrap;';
  var td='font-size:11px;padding:4px 6px;border:1px solid #dde;text-align:center;';
  var hdrCF='background:#e8e6f0;color:#3730A3;font-weight:700;';
  var hdrCC='background:#e6f0ec;color:#065F46;font-weight:700;';
  var hdrR='background:#E0E7FF;color:#3730A3;font-weight:800;';
  var hdrL='background:#D1FAE5;color:#065F46;font-weight:800;';

  /* Build header row: Side label grouped */
  var rCols=usedCols.filter(function(k){return side[k]==='R';});
  var lCols=usedCols.filter(function(k){return side[k]==='L';});

  var tbl='<div style="margin-bottom:14px">'
    +'<div style="font-size:10px;font-weight:700;color:#075985;text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px;border-bottom:1.5px solid #dde2e2;margin-bottom:6px">PV — CC\'s &amp; CF\'s</div>'
    +'<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px"><thead>';

  /* Row 1: Date | Seg | RIGHT(n) | LEFT(m) */
  tbl+='<tr>'
    +'<th style="'+th+'min-width:48px" rowspan="3">Date</th>'
    +'<th style="'+th+'min-width:48px" rowspan="3">Seg</th>';
  if(rCols.length) tbl+='<th colspan="'+rCols.length+'" style="'+th+hdrR+'">RIGHT</th>';
  if(lCols.length) tbl+='<th colspan="'+lCols.length+'" style="'+th+hdrL+'">LEFT</th>';
  tbl+='</tr>';

  /* Row 2: CF's / CC's grouping */
  tbl+='<tr>';
  function addGroupHeaders(cols,hCF,hCC){
    var i=0;
    while(i<cols.length){
      var isCF=cfKeys.indexOf(cols[i])>=0;
      var j=i+1;
      while(j<cols.length&&(cfKeys.indexOf(cols[j])>=0)===isCF) j++;
      var span=j-i;
      tbl+='<th colspan="'+span+'" style="'+th+(isCF?hCF:hCC)+'">'+(isCF?'CF\'s':'CC\'s')+'</th>';
      i=j;
    }
  }
  addGroupHeaders(rCols,hdrCF,hdrCC);
  addGroupHeaders(lCols,hdrCF,hdrCC);
  tbl+='</tr>';

  /* Row 3: individual column labels */
  tbl+='<tr>';
  for(var ci=0;ci<usedCols.length;ci++){
    var isCF=cfKeys.indexOf(usedCols[ci])>=0;
    var isLeft=side[usedCols[ci]]==='L';
    var borderLeft=(ci>0&&isLeft&&side[usedCols[ci-1]]==='R')?'border-left:2px solid #aab;':'';
    tbl+='<th style="'+th+(isCF?hdrCF:hdrCC)+borderLeft+'">'+colLabels[usedCols[ci]]+'</th>';
  }
  tbl+='</tr></thead><tbody>';

  /* Data rows */
  for(var ri=0;ri<pvC.length;ri++){
    var r=pvC[ri];
    tbl+='<tr>'
      +'<td style="'+td+'font-size:10px">'+escHtml(r.date||'')+'</td>'
      +'<td style="'+td+'font-size:10px">'+escHtml(r.seg||'')+'</td>';
    for(var ci=0;ci<usedCols.length;ci++){
      var isLeft=side[usedCols[ci]]==='L';
      var borderLeft=(ci>0&&isLeft&&side[usedCols[ci-1]]==='R')?'border-left:2px solid #aab;':'';
      tbl+='<td style="'+td+borderLeft+'">'+escHtml(r[usedCols[ci]]||'')+'</td>';
    }
    tbl+='</tr>';
  }

  tbl+='</tbody></table></div></div>';
  return tbl;
}

/* ═══════════════════════════════════════════════════════════════
   OFFLINE-FIRST SYNC ENGINE
   ─────────────────────────────────────────────────────────────
   How it works:
   • All data lives in localStorage (always available, even offline)
   • Every patient edit is timestamped (updatedAt)
   • When server is reachable → sync merges by timestamp (newest wins)
   • When offline → keeps working, queues a "dirty" flag
   • At home on Wi-Fi → tap Sync Once to push everything to SQLite
   • Smart merge: never overwrites newer data with older data
   ═══════════════════════════════════════════════════════════════ */

var SERVER_URL = '';
var IS_ONLINE  = false;   /* true only when server is confirmed reachable */

try { SERVER_URL = localStorage.getItem('bm_server_url') || ''; } catch(e) {}

/* ── Timestamp every save ── */
function sv() {
  try {
    /* Mark each patient with the time it was last changed */
    var now = new Date().toISOString();
    for (var i = 0; i < DB.patients.length; i++) {
      if (!DB.patients[i]._local_updated) DB.patients[i]._local_updated = now;
    }
    localStorage.setItem('bm_v6', JSON.stringify(DB));
    localStorage.setItem('bm_dirty', '1');   /* flag: unsynced changes exist */
    return true;
  } catch(e) {
    /* Most common cause: localStorage quota exceeded (large photo/scan
       attachments) or private-browsing mode. Surface it instead of losing
       data silently. */
    try {
      if (typeof showToast === 'function')
        showToast('⚠ Could not save — storage full. Remove large attachments or export a backup.', true);
    } catch(_e) {}
    return false;
  }
}

/* ── Mark a patient as just changed ── */

/* ── Smart merge: newest version of each patient wins, deleted IDs excluded ── */
function mergePatients(local, remote) {
  /* Build a set of locally deleted IDs to exclude from server data */
  var deleted = {};
  var dids = DB.deletedIds || [];
  for (var i = 0; i < dids.length; i++) deleted[dids[i]] = true;

  var byId = {};
  for (var i = 0; i < local.length; i++) {
    if (!deleted[local[i].id]) byId[local[i].id] = local[i];
  }
  for (var i = 0; i < remote.length; i++) {
    var rp = remote[i];
    /* Skip patients that were deleted locally */
    if (deleted[rp.id]) continue;
    var lp = byId[rp.id];
    if (!lp) {
      /* Patient only on server → add locally */
      byId[rp.id] = rp;
    } else {
      /* Both have it → keep whichever is newer */
      var lt = lp._local_updated || lp._server_updated || '0';
      var rt = rp._server_updated || rp._local_updated || '0';
      if (rt > lt) byId[rp.id] = rp;
    }
  }
  var result = [];
  for (var k in byId) { if (Object.prototype.hasOwnProperty.call(byId, k)) result.push(byId[k]); }
  result.sort(function(a,b){ return (a.info&&a.info.name||'').localeCompare(b.info&&b.info.name||''); });
  return result;
}

/* ── Build API URL — appends ?token= if present in the saved URL ── */
function apiUrl(endpoint) {
  var base = SERVER_URL.replace(/\/$/, '');
  /* If the URL itself contains ?token=xxx, extract and reuse it */
  var tokenMatch = base.match(/[?&]token=([^&]+)/);
  var token = tokenMatch ? tokenMatch[1] : '';
  var cleanBase = base.split('?')[0];
  return cleanBase + endpoint + (token ? '?token=' + encodeURIComponent(token) : '');
}

/* ── SYNC (push local → server, pull merged result back) ── */
function syncServer() {
  if (!SERVER_URL) { showToast('Enter your home server URL first', true); return; }
  doCollect();
  var btn = document.getElementById('syncBtn');
  if (btn) btn.classList.add('syncing');
  setStatus('Syncing…');

  /* Tag all local patients with local timestamp before sending */
  var now = new Date().toISOString();
  var toSend = JSON.parse(JSON.stringify(DB.patients));
  for (var i = 0; i < toSend.length; i++) {
    if (!toSend[i]._local_updated) toSend[i]._local_updated = now;
  }

  fetch(apiUrl('/sync'), {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ patients: toSend, clinic: DB.clinic, deletedIds: DB.deletedIds || [] })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    if (data.patients) {
      /* Merge server response with local — newest wins per patient */
      var merged = mergePatients(DB.patients, data.patients);
      DB.patients = merged;
      if (data.clinic) {
        for (var k in data.clinic) {
          if (Object.prototype.hasOwnProperty.call(data.clinic, k)) DB.clinic[k] = data.clinic[k];
        }
      }
      /* Clear deletedIds — server has processed them */
      DB.deletedIds = [];
      /* Save merged result, clear dirty flag */
      try {
        localStorage.setItem('bm_v6', JSON.stringify(DB));
        localStorage.removeItem('bm_dirty');
      } catch(e) {}
      var prev = CUR ? CUR.id : null;
      CUR = null; CV = 0;
      renderSB();
      /* Re-select previously open patient if there was one */
      if (prev) {
        for (var i = 0; i < DB.patients.length; i++) {
          if (DB.patients[i].id === prev) { selectPt(prev); break; }
        }
      }
      if (!CUR) {
        document.getElementById('mainArea').innerHTML =
          '<div class="empty-s"><div class="es-icon">✅</div>'
          +'<div class="es-txt">Sync complete</div>'
          +'<div class="es-sub">'+merged.length+' patients · all data up to date</div></div>';
      }
    }
    setStatus('Synced ' + new Date().toLocaleTimeString(), true);
    var _cnt = (data.patients ? data.patients.length : DB.patients.length);
    showToast('Sync complete ✓ · ' + _cnt + ' patients');
  })
  .catch(function(err) {
    setStatus('Server unreachable', false);
    showToast('Cannot reach server — working offline', true);
  })
  .finally(function() {
    if (btn) btn.classList.remove('syncing');
  });
}

/* ── Silent background ping to check connectivity ── */
function pingServer() {
  if (!SERVER_URL) return;
  fetch(apiUrl('/ping'), { method: 'GET' })
    .then(function(r) {
      if (r.ok) {
        setStatus('Server reachable ✓', true);
        /* Auto-sync if there are pending changes and server just became available */
        var dirty = '';
        try { dirty = localStorage.getItem('bm_dirty') || ''; } catch(e) {}
        if (dirty) showToast('Server reachable — tap Sync to push clinic data');
      } else {
        setStatus('Server unreachable', false);
      }
    })
    .catch(function() { setStatus('Offline — clinic mode', false); });
}

/* ─── EXPORT / IMPORT JSON ─── */
function exportJSON() {
  doCollect();
  var payload = { version: 1, exported: new Date().toISOString(), clinic: DB.clinic, patients: DB.patients };
  var json  = JSON.stringify(payload, null, 2);
  var blob  = new Blob([json], { type: 'application/json' });
  var url   = URL.createObjectURL(blob);
  var a     = document.createElement('a');
  var d     = new Date();
  var stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  a.href     = url;
  a.download = 'BeyondMechanics_backup_' + stamp + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  try { localStorage.setItem('bm_last_export', new Date().toISOString()); } catch(e) {}
  showToast('Backup downloaded ✓');
}

function importJSON(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.patients) { showToast('Invalid backup file', true); return; }
      var mode = confirm(
        'Import ' + data.patients.length + ' patients?\n\n' +
        'OK     = MERGE  (keep current + add from file, newest wins)\n' +
        'Cancel = REPLACE (wipe current and load file)'
      );
      if (mode) {
        var merged = mergePatients(DB.patients, data.patients);
        var added  = merged.length - DB.patients.length;
        DB.patients = merged;
        showToast('Merged · ' + added + ' new patients added ✓');
      } else {
        DB.patients = data.patients;
        if (data.clinic) {
          for (var k in data.clinic) {
            if (Object.prototype.hasOwnProperty.call(data.clinic, k)) DB.clinic[k] = data.clinic[k];
          }
        }
        CUR = null; CV = 0;
        showToast('Data replaced from backup ✓');
      }
      try { localStorage.setItem('bm_v6', JSON.stringify(DB)); localStorage.setItem('bm_dirty','1'); } catch(ex) {}
      renderSB();
      document.getElementById('mainArea').innerHTML =
        '<div class="empty-s"><div class="es-icon">✅</div><div class="es-txt">Import complete</div>'
        +'<div class="es-sub">Select a patient from the list</div></div>';
    } catch(err) {
      showToast('Import failed — invalid file', true);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;z-index:9999;transition:opacity .35s;pointer-events:none;text-align:center;max-width:90vw';
    document.body.appendChild(t);
  }
  t.textContent    = msg;

  clearTimeout(t._tmr);
  t._tmr = setTimeout(function() { t.style.opacity = '0'; }, 3200);
}

/* ─── PSFS HELPER ─── */
function psfsRows(n) {
  var rows = n.psfs || [];
  /* Always show 3 activity rows */
  while (rows.length < 3) rows.push({activity:'', score:''});
  var html = '';
  for (var i = 0; i < rows.length; i++) {
    html += '<div style="display:grid;grid-template-columns:minmax(0,2fr) 80px;gap:8px;align-items:center;margin-bottom:6px">'
      +'<input data-psfs="'+i+'.activity" value="'+esc(rows[i].activity||'')+'" placeholder="Activity (e.g. Walking 500m)" oninput="collectPSFS()" type="text" style="font-size:12px;padding:7px 9px">'
      +'<input data-psfs="'+i+'.score" value="'+esc(rows[i].score||'')+'" placeholder="0–10" type="number" min="0" max="10" oninput="collectPSFS()" style="font-size:12px;padding:7px 9px;text-align:center">'
      +'</div>';
  }
  var avg = psfsAverage({psfs:rows});
  html += '<div style="display:grid;grid-template-columns:minmax(0,2fr) 80px;gap:8px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--brd)">'
    +'<div style="font-size:11px;font-weight:700;color:var(--muted)">Average PSFS score</div>'
    +'<div id="psfsAvg" style="font-size:13px;font-weight:800;text-align:center;color:var(--pu)">'+(avg!=null?avg.toFixed(1)+' / 10':'—')+'</div>'
    +'</div>';
  return html;
}

/* Mean of the recorded PSFS activity scores (the conventional PSFS total) */
function psfsAverage(n){
  var rows=(n&&n.psfs)||[]; var sum=0,cnt=0;
  for(var i=0;i<rows.length;i++){ var s=parseFloat(rows[i].score); if(!isNaN(s)){sum+=s;cnt++;} }
  return cnt?(sum/cnt):null;
}

function collectPSFS() {
  if (!CUR) return;
  var v = CUR.visits[CV];
  if (!v.nrs) v.nrs = {};
  var f = document.getElementById('ptForm');
  if (!f) return;
  var psfsEls = f.querySelectorAll('[data-psfs]');
  if (!v.nrs.psfs) v.nrs.psfs = [{},{},{}];
  for (var i = 0; i < psfsEls.length; i++) {
    var parts = psfsEls[i].dataset.psfs.split('.');
    var idx = parseInt(parts[0],10); var key = parts[1];
    if (!v.nrs.psfs[idx]) v.nrs.psfs[idx] = {};
    v.nrs.psfs[idx][key] = psfsEls[i].value;
  }
  var avgEl = document.getElementById('psfsAvg');
  if (avgEl) { var a = psfsAverage(v.nrs); avgEl.textContent = (a!=null ? a.toFixed(1)+' / 10' : '—'); }
  CUR._local_updated = new Date().toISOString();
  sv();
}

/* ─── NRS PROGRESS CHART ─── */
function drawNRSChart() {
  var canvas = document.getElementById('nrsChart');
  if (!canvas || !CUR) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 560;
  var H = 160;
  canvas.width = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, W, H);

  var dark = false;
  var gridCol = dark ? '#2a3636' : '#e8eeee';
  var textCol = dark ? '#7aacac' : '#5a6868';
  var lineCol = '#E24B4A';
  var dotCol  = '#534AB7';

  /* Collect current NRS scores across visits */
  var points = [];
  for (var i = 0; i < CUR.visits.length; i++) {
    var nrs = CUR.visits[i].nrs || {};
    var val = nrs.current;
    var lbl = i === 0 ? 'Initial' : 'FU ' + i;
    points.push({ label: lbl, value: val !== null && val !== undefined ? val : null });
  }

  var validPts = points.filter(function(p){ return p.value !== null; });
  var padL = 34, padR = 16, padT = 14, padB = 36;
  var plotW = W - padL - padR;
  var plotH = H - padT - padB;

  /* Grid lines 0,2,4,6,8,10 */
  ctx.strokeStyle = gridCol; ctx.lineWidth = 1;
  for (var g = 0; g <= 10; g += 2) {
    var y = padT + plotH - (g / 10) * plotH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
    ctx.fillStyle = textCol; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(g, padL - 4, y + 3);
  }

  if (validPts.length === 0) {
    ctx.fillStyle = textCol; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('No scores recorded yet', W / 2, H / 2);
    return;
  }

  /* X positions */
  var step = points.length > 1 ? plotW / (points.length - 1) : plotW / 2;
  var coords = [];
  for (var i = 0; i < points.length; i++) {
    var x = padL + (points.length > 1 ? i * step : plotW / 2);
    var y2 = points[i].value !== null ? padT + plotH - (points[i].value / 10) * plotH : null;
    coords.push({ x: x, y: y2, label: points[i].label, val: points[i].value });
  }

  /* Line */
  ctx.strokeStyle = lineCol; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  var started = false;
  for (var i = 0; i < coords.length; i++) {
    if (coords[i].y === null) continue;
    if (!started) { ctx.moveTo(coords[i].x, coords[i].y); started = true; }
    else ctx.lineTo(coords[i].x, coords[i].y);
  }
  ctx.stroke();

  /* Dots + labels */
  for (var i = 0; i < coords.length; i++) {
    if (coords[i].y === null) continue;
    /* Colour dot by severity */
    var v2 = coords[i].val;
    var dc = v2 <= 3 ? '#1D9E75' : v2 <= 6 ? '#BA7517' : '#E24B4A';
    ctx.fillStyle = dc; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(coords[i].x, coords[i].y, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    /* Score label above dot */
    ctx.fillStyle = textCol; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(coords[i].val, coords[i].x, coords[i].y - 8);
    /* X-axis label */
    ctx.font = '9px sans-serif';
    ctx.fillText(coords[i].label, coords[i].x, H - padB + 14);
  }
}

  try { localStorage.setItem('bm_theme', next); } catch(e) {}
